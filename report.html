  const zm=document.createElement('div'); zm.className='modal-bg';
  zm.innerHTML=`<div class="modal"><div class="modal-head" style="background:linear-gradient(135deg,#8a1c1c,#c62828)"><div class="mh-ic">!</div><div><h3>Enter Number of Animals</h3></div></div>
    <div class="modal-body"><div class="viable-note" style="background:#fff5f5;border-color:#f3c2c2"><div class="big" style="color:#c62828">0</div><div>You haven't entered any animals. Please go back and enter the herd size.</div></div></div>
    <div class="modal-foot"><button class="mbtn ghost" data-close>Close</button><button class="mbtn primary" id="zmGo2">Go to Input Fields</button></div></div>`;
  document.body.appendChild(zm);
  // review modal — shown when the project is NOT viable (ask the user to correct inputs)
  const rm=document.createElement('div'); rm.className='modal-bg';
  (function(){
    const ind=(l,ok,v)=>`<div class="srow"><span>${l}</span><b class="pill" style="background:${ok?'#e7f5ea':'#fdeaea'};color:${ok?'#1c7a43':'#c62828'}">${ok?'✓':'✗'} ${v}</b></div>`;
    const it=(s.interest!=null?s.interest:0);
    rm.innerHTML=`<div class="modal"><div class="modal-head" style="background:linear-gradient(135deg,#8a1c1c,#c62828)"><div class="mh-ic">!</div><div><h3>Project Not Yet Bankable</h3><p>One or more indicators are below the required norm</p></div></div>
      <div class="modal-body"><p style="font-size:12.5px;color:var(--muted);margin:0 0 8px;line-height:1.5">For the project to be <b>viable &amp; bankable</b>, all four indicators must pass. Please go back and <b>correct your inputs</b> (for example unit size, costs or sale prices).</p>
      ${ind('Net Present Value (must be &gt; 0)', s.npv>0, INR(s.npv))}
      ${ind('Benefit–Cost Ratio (must be &gt; 1)', s.bcr>1, F2(s.bcr))}
      ${ind('IRR (must exceed '+F2(it)+'%)', s.irr>it, F2(s.irr)+'%')}
      ${ind('Average DSCR (must be &gt; 1.5)', s.dscr>1.5, F2(s.dscr))}
      </div>
      <div class="modal-foot"><button class="mbtn ghost" id="rmSave2">Save Anyway</button><button class="mbtn primary" id="rmEdit2"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Correct Inputs</button></div></div>`;
  })();
  document.body.appendChild(rm);
  const isViable=(s.viable!=null)?s.viable:(!s.zero && s.npv>0 && s.bcr>1 && s.dscr>1.5 && (s.interest==null||s.irr>s.interest));
  const open=m=>m.classList.add('show'), close=m=>m.classList.remove('show');
  document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',e=>close(e.target.closest('.modal-bg'))));
  [pm,vm,zm,rm].forEach(m=>m.addEventListener('click',e=>{if(e.target===m)close(m);}));
  zm.querySelector('#zmGo2').addEventListener('click',()=>{ window.location.href='form.html'; });
  rm.querySelector('#rmEdit2').addEventListener('click',()=>{ window.location.href='form.html'; });
  rm.querySelector('#rmSave2').addEventListener('click',()=>doSave());
  let saving=false;
  function doSave(){ if(saving)return; saving=true; close(pm); close(vm);
    const el=document.getElementById('out'); document.body.classList.add('exporting');
    const done=()=>{document.body.classList.remove('exporting');saving=false;};
    if(window.html2pdf){ exportPagesPDF(s.species+'-Project-Report_'+((s.name||'farm').replace(/[^\w]+/g,'_'))+'.pdf').then(done).catch(()=>{ done(); alert('Could not prepare the PDF. Please try again.'); }); }
    else { done(); alert('PDF library missing.'); } }
  function reqSave(){ if(s.zero){ open(zm); return; } close(pm); if(!isViable){ open(rm); return; } if(dscrViable) open(vm); else doSave(); }
  document.getElementById('previewBtn').addEventListener('click',()=> open(s.zero?zm:pm));
  document.getElementById('downloadBtn').addEventListener('click',()=> s.zero?open(zm):reqSave());
  pm.querySelector('#pmDl2').addEventListener('click',reqSave);
  vm.querySelector('#vmDl2').addEventListener('click',doSave);
  // tracking
  try{
    if(!(D.genToken && sessionStorage.getItem('trackSent')===D.genToken)){
      const payload={ species:s.species, name:s.name, mobile:s.mobile, email:s.email, date:s.date, time:s.time||new Date().toLocaleTimeString('en-IN'),
        animalType:s.animalType, breed:s.breed, numAnimals:s.numAnimals, projectCost:Math.round(s.projectCost), loan:Math.round(s.loan),
        npv:Math.round(s.npv), bcr:+(+s.bcr).toFixed(2), irr:+(+s.irr).toFixed(2), dscr:+(+s.dscr).toFixed(2), details:JSON.stringify(s.details) };
      const url=TRACK_URL2+(TRACK_URL2.indexOf('?')>=0?'&':'?')+'payload='+encodeURIComponent(JSON.stringify(payload));
      if(window.fetch){ fetch(url,{method:'GET',mode:'no-cors',keepalive:true,cache:'no-store'}).catch(()=>{}); }
      else { window.__beacons=window.__beacons||[]; const img=new Image(); window.__beacons.push(img); img.src=url; }
      if(D.genToken) sessionStorage.setItem('trackSent',D.genToken);
    }
  }catch(e){}
}

// ════════════════════════════════════════════════════════════════════
//  CHART-BASED REPORT  (single-sheet 8-panel infographic · reads window.__CHART)
//  Pure presentation — no figure here is recalculated.
// ════════════════════════════════════════════════════════════════════
(function(){
  const GREEN='#14532d',GOLD='#f0b429',CREAM='#faf6ea',INK='#1d3b25',MUT='#6b6655';
  const PAL=['#2e7d32','#f0b429','#c47f3d','#6ba368','#9c6b3f','#4f7d8c'];
  const sINR=n=>{n=Math.round(n||0);const a=Math.abs(n);if(a>=1e7)return '₹'+(n/1e7).toFixed(2)+' Cr';if(a>=1e5)return '₹'+(n/1e5).toFixed(2)+' L';if(a>=1e3)return '₹'+Math.round(n/1e3)+'k';return '₹'+n;};
  const sum=arr=>arr.reduce((a,x)=>a+(x[1]||0),0);
  const colorize=arr=>arr.filter(x=>x[1]>0).map((x,i)=>({label:x[0],v:x[1],c:PAL[i%PAL.length]}));

  function gpt(cx,cy,r,th){const a=th*Math.PI/180;return [cx+r*Math.cos(a),cy-r*Math.sin(a)];}
  function garc(cx,cy,r,from,to){const s=gpt(cx,cy,r,from),e=gpt(cx,cy,r,to);return `M ${s[0].toFixed(1)} ${s[1].toFixed(1)} A ${r} ${r} 0 0 1 ${e[0].toFixed(1)} ${e[1].toFixed(1)}`;}
  function gauge(val,max,disp,sub,good,W){
    W=W||128;const H=Math.round(W*0.66),cx=W/2,cy=W*0.5+2,r=W/2-11;
    const f=Math.max(0,Math.min(1,(val||0)/(max||1))),col=good?'#2e7d32':'#c98a2e';
    const pctv=/%/.test(disp||''), dl=(disp||'').length, ff=pctv?(dl>=5?0.125:0.14):(dl>=6?0.125:0.16);
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <path d="${garc(cx,cy,r,180,0)}" fill="none" stroke="#e4ddc9" stroke-width="10" stroke-linecap="round"/>
      <path d="${garc(cx,cy,r,180,180-180*f)}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"/>
      <text x="${cx}" y="${(cy-4).toFixed(1)}" text-anchor="middle" font-size="${(W*ff).toFixed(0)}" font-weight="800" fill="${INK}" font-family="Arial">${disp}</text>
      <text x="${cx}" y="${(cy+10).toFixed(1)}" text-anchor="middle" font-size="10" fill="${MUT}" font-family="Arial">${sub||''}</text></svg>`;
  }
  function donut(segs,size,sw){
    sw=sw||20;const cx=size/2,cy=size/2,r=size/2-sw/2-1,C=2*Math.PI*r,total=segs.reduce((a,s)=>a+s.v,0)||1;let off=0,a='';
    segs.forEach(s=>{const dash=Math.max(0,s.v)/total*C;a+=`<circle cx="${cx}" cy="${cy}" r="${r.toFixed(1)}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=dash;});
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${a}</svg>`;
  }
  function dleg(segs){return segs.map(s=>`<div style="display:flex;align-items:center;gap:5px;font-size:8.5px;color:${INK};margin:1.5px 0;line-height:1.1"><span style="width:8px;height:8px;border-radius:2px;background:${s.c};display:inline-block;flex:none"></span><span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.label}</span><b style="flex:none">${sINR(s.v)}</b></div>`).join('');}
  function donutCell(title,total,segs){return `<div style="display:flex;align-items:center;gap:8px;min-width:0">
    <div style="position:relative;width:72px;height:72px;flex:none">${donut(segs,72,16)}<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:7.5px;font-weight:800;color:${INK}">Total</div><div style="font-size:7.5px;color:${MUT}">${total}</div></div></div>
    <div style="flex:1;min-width:0"><div class="sub-t" style="margin-bottom:2px">${title}</div>${dleg(segs)}</div></div>`;}
  function barChart(labels,inc,exp,w,h){
    const pL=56,pR=12,pT=10,pB=24,cw=w-pL-pR,ch=h-pT-pB,max=Math.max(...inc,...exp,1),n=labels.length,gw=cw/n,bw=Math.min(20,gw*0.32);
    let g='',b='',ax='';
    for(let i=0;i<=3;i++){const gy=pT+ch-ch*i/3;g+=`<line x1="${pL}" y1="${gy.toFixed(1)}" x2="${(w-pR).toFixed(1)}" y2="${gy.toFixed(1)}" stroke="#e6dec9" stroke-width="1"/><text x="${pL-6}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="${MUT}" font-family="Arial">${sINR(max*i/3)}</text>`;}
    labels.forEach((lb,i)=>{const c=pL+gw*i+gw/2,hi=inc[i]/max*ch,he=exp[i]/max*ch;
      b+=`<rect x="${(c-bw-2).toFixed(1)}" y="${(pT+ch-hi).toFixed(1)}" width="${bw}" height="${hi.toFixed(1)}" fill="${PAL[0]}" rx="2.5"/><rect x="${(c+2).toFixed(1)}" y="${(pT+ch-he).toFixed(1)}" width="${bw}" height="${he.toFixed(1)}" fill="${PAL[1]}" rx="2.5"/>`;
      ax+=`<text x="${c.toFixed(1)}" y="${(h-8).toFixed(1)}" text-anchor="middle" font-size="10" fill="${INK}" font-family="Arial">${lb}</text>`;});
    return `<svg class="chart" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${g}${b}${ax}</svg>`;
  }
  function lineChart(vals,w,h){
    const pL=56,pR=14,pT=10,pB=24,cw=w-pL-pR,ch=h-pT-pB,max=Math.max(...vals,1),n=vals.length;
    const X=i=>pL+(n<=1?0:cw*i/(n-1)),Y=v=>pT+ch-v/max*ch;
    let g='';for(let i=0;i<=3;i++){const gy=pT+ch-ch*i/3;g+=`<line x1="${pL}" y1="${gy.toFixed(1)}" x2="${(w-pR).toFixed(1)}" y2="${gy.toFixed(1)}" stroke="#e6dec9" stroke-width="1"/><text x="${pL-6}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" font-size="9.5" fill="${MUT}" font-family="Arial">${sINR(max*i/3)}</text>`;}
    const pts=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    const area=`${X(0).toFixed(1)},${(pT+ch).toFixed(1)} ${pts} ${X(n-1).toFixed(1)},${(pT+ch).toFixed(1)}`;
    let d='',lb='';vals.forEach((v,i)=>{d+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.5" fill="#1c6b3a"/>`;lb+=`<text x="${X(i).toFixed(1)}" y="${(h-8).toFixed(1)}" text-anchor="middle" font-size="10" fill="${INK}" font-family="Arial">${i===0?'Start':'Yr '+i}</text>`;});
    return `<svg class="chart" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${g}<polygon points="${area}" fill="rgba(46,125,50,.13)"/><polyline points="${pts}" fill="none" stroke="#2e7d32" stroke-width="3"/>${d}${lb}</svg>`;
  }

  function buildSheet(c){
    const idx=c.NY>1?1:0, pos=c.viable;
    const emo=c.species==='Goat'?'🐐':(c.species==='Hen'?'🐔':(c.species==='Sheep'?'🐑':'🐄'));
    const F2=n=>(+n).toFixed(2), pct=n=>(+n).toFixed(1)+'%', mean=a=>a.reduce((x,y)=>x+y,0)/(a.length||1);
    const incBreak=colorize(c.incomeBreak), costBreak=colorize(c.costBreak), invBreak=colorize(c.investBreak), finBreak=colorize(c.financeBreak);
    const incomeYr=c.income[idx], expYr=c.expenditure[idx], netYr=c.net[idx];
    let beYear='—'; for(let y=0;y<c.NY;y++){ if(c.net[y]>0){ beYear='Year '+(y+1); break; } }
    const seal=pos?{t:'VIABLE & BANKABLE',c1:'#1c7a43',c2:'#11592e',ic:'✓'}:{t:'REVIEW REQUIRED',c1:'#b9822b',c2:'#8a5f17',ic:'!'};
    const FOOT='VC&RI NAMAKKAL · DEPT. OF AH ECONOMICS · GUIDED BY DR. V. SENTHILKUMAR';
    const panel=(n,t,body)=>`<div class="cp"><div class="cp-h"><span class="cp-n">${n}</span><span class="cp-t">${t}</span></div><div class="cp-b">${body}</div><div class="cp-f">${FOOT}</div></div>`;
    const tile=(l,v,s,ac)=>`<div style="flex:1;background:#fff;border:1px solid #ece4cf;border-left:3px solid ${ac||GOLD};border-radius:7px;padding:6px 9px;min-width:0"><div style="font-size:8px;letter-spacing:.3px;color:${MUT};text-transform:uppercase;font-weight:700">${l}</div><div style="font-size:16px;font-weight:800;color:${INK};line-height:1.05;margin-top:2px">${v}</div><div style="font-size:7.5px;color:${MUT}">${s||''}</div></div>`;
    const fact=(ic,l,v)=>`<div style="flex:1;text-align:center;padding:0 3px"><div style="font-size:16px;line-height:1">${ic}</div><div style="font-size:12.5px;font-weight:800;color:${INK};line-height:1.05;margin-top:1px">${v}</div><div style="font-size:7px;color:${MUT};text-transform:uppercase;letter-spacing:.2px">${l}</div></div>`;

    /* 01 — COVER */
    const refNo='VCRI/'+c.species.toUpperCase().slice(0,2)+'/'+((c.dateStr||'').replace(/\D/g,'').slice(-4)||'0001');
    const COVER_IMG={ Cow:'Gemini_Generated_Image_yxhbasyxhbasyxhb.png', Goat:'Goat for Chart PDF.png', Hen:'Hen for Chart PDF.png', Sheep:'Sheep for Chart PDF.jpg' };
    const _coverImg=COVER_IMG[c.species];
    const coverBg=_coverImg
      ? "linear-gradient(to bottom, rgba(7,38,19,.66) 0%, rgba(7,38,19,.22) 28%, rgba(7,38,19,.80) 64%, rgba(7,38,19,.97) 100%), url('"+encodeURI(_coverImg)+"') center/cover"
      : "linear-gradient(160deg,#16572f,#0b3a1e)";
    const watermark=_coverImg ? '' : `<div style="position:absolute;left:50%;top:32%;transform:translate(-50%,-50%);font-size:108px;opacity:.13;line-height:1">${emo}</div>`;
    const metric=(l,v)=>`<div style="flex:1;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.20);border-radius:7px;padding:5px 9px"><div style="font-size:8px;letter-spacing:.3px;color:#d2e0d3;text-transform:uppercase;font-weight:700">${l}</div><div style="font-size:15px;font-weight:800;color:#fff;line-height:1.1;margin-top:1px">${v}</div></div>`;
    const p01=`<div class="cp cover" style="background:${coverBg}">${watermark}
      <div style="position:relative;padding:13px 15px;display:flex;flex-direction:column;height:100%;text-align:center;box-sizing:border-box;text-shadow:0 1px 5px rgba(0,0,0,.6)">
        <div>
          <div style="font-size:8px;letter-spacing:1.5px;color:#e7d49a">VC&amp;RI NAMAKKAL · BANKABLE PROJECT</div>
          <div style="font-size:23px;font-weight:800;color:${GOLD};font-family:Georgia,serif;line-height:1.02;margin-top:3px">${c.title.toUpperCase()}</div>
          <div style="font-size:8.5px;letter-spacing:1.5px;color:#eaf2ea;margin-top:3px">FINANCIAL VIABILITY REPORT</div>
        </div>
        <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
          <div style="display:inline-block;align-self:center;background:${GOLD};color:#1c1403;font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px">${c.unitText.toUpperCase()}</div>
          <div style="display:flex;gap:6px">${metric('IRR',pct(c.irr))}${metric('BCR',F2(c.bcr))}</div>
          <div style="display:flex;gap:6px">${metric('DSCR (avg)',F2(c.avgDscr))}${metric('NPV',sINR(c.npv))}</div>
          <div style="background:linear-gradient(150deg,${seal.c1},${seal.c2});border:1px solid rgba(255,255,255,.22);border-radius:8px;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;padding:7px"><span style="font-size:17px">${seal.ic}</span><span style="font-size:12px;font-weight:800;letter-spacing:.4px">${seal.t}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:7.5px;color:#d6e2d6;border-top:1px solid rgba(255,255,255,.22);padding-top:5px">
            <span>The Manager, ${(typeof S!=='undefined'&&S('bankName'))||'Financing Bank'}</span><span>${c.dateStr||''}</span></div>
        </div>
      </div></div>`;

    /* 02 — EXECUTIVE SNAPSHOT */
    const p02=panel('02','Executive Snapshot',`<div style="display:flex;flex-direction:column;justify-content:space-between;height:100%">
      <div style="display:flex;gap:6px">${tile('NPV',sINR(c.npv),'present value')}${tile('Loan',sINR(c.loan),'from bank',PAL[5])}${tile('IRR',pct(c.irr),'vs '+c.interest+'%')}${tile('DSCR',F2(c.avgDscr),'debt cover',PAL[0])}</div>
      <div><div class="sub-t" style="text-align:center">Viability Ratio Gauges</div>
        <div style="display:flex">
          <div style="flex:1;text-align:center">${gauge(c.irr,Math.max(40,c.irr*1.25),pct(c.irr),'IRR',c.irr>c.interest,92)}</div>
          <div style="flex:1;text-align:center">${gauge(c.bcr,2.5,F2(c.bcr),'BCR',c.bcr>1,92)}</div>
          <div style="flex:1;text-align:center">${gauge(c.avgDscr,4,F2(c.avgDscr),'DSCR',c.avgDscr>=1.5,92)}</div>
        </div></div>
      <div style="display:flex;background:#fff;border:1px solid #ece4cf;border-radius:8px;padding:6px 2px">${fact('🐄',c.factUnitLabel,c.factUnitValue)}${fact('📦',c.factOutputLabel,c.factOutputValue)}${fact('💰','Income/yr',sINR(incomeYr))}${fact('🗓️','Repay',c.NY+' yr')}</div>
    </div>`);

    /* 03 — THE MODEL */
    const chip=(ic,l,v,hi)=>`<div style="text-align:center;flex:1;min-width:0"><div style="font-size:20px;line-height:1">${ic}</div><div style="font-size:12px;font-weight:800;color:${hi?'#1c7a43':INK};line-height:1.1;margin-top:2px">${v}</div><div style="font-size:8px;color:${MUT};text-transform:uppercase;letter-spacing:.2px">${l}</div></div>`;
    const op=v=>`<div style="flex:none;align-self:center;font-size:18px;font-weight:800;color:${GOLD}">${v}</div>`;
    const tl=[['Year 1','Project Start']]; if(c.NY>=3)tl.push(['Year 2','Full Production']); if(c.NY>=5)tl.push(['Year '+Math.ceil(c.NY/2),'Break-even']); tl.push(['Year '+c.NY,'Loan Repaid']);
    const tlHTML=tl.map((t,i)=>`<div style="flex:1;text-align:center;position:relative;min-width:0"><div style="width:12px;height:12px;border-radius:50%;background:${i===tl.length-1?GOLD:'#2e7d32'};margin:0 auto;border:2px solid #fff;box-shadow:0 0 0 1.5px #cfc9b5"></div><div style="font-size:9px;font-weight:800;color:${INK};margin-top:4px">${t[0]}</div><div style="font-size:8px;color:${MUT};line-height:1.2">${t[1]}</div></div>`).join('');
    const p03=panel('03','The Model — Business Flow',`<div style="display:flex;flex-direction:column;justify-content:space-around;height:100%">
      <div>
        <div class="sub-t">The Rupee Flow (per year)</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:2px;background:#fff;border:1px solid #ece4cf;border-radius:9px;padding:9px 6px">${chip(emo,'Income',sINR(incomeYr))}${op('−')}${chip('💸','Expenses',sINR(expYr))}${op('=')}${chip('✅','Net Profit',sINR(netYr),true)}</div>
      </div>
      <div>
        <div class="sub-t">${c.NY}-Year Journey</div>
        <div style="position:relative;margin-top:6px"><div style="position:absolute;top:6px;left:8%;right:8%;height:3px;background:#d9d2bd"></div><div style="display:flex;position:relative">${tlHTML}</div></div>
      </div>
    </div>`);

    /* 04 — THE MONEY (2×2 donuts) */
    const p04=panel('04','The Money — Investment & Finance',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;height:100%;align-content:center">
      ${donutCell('Investment Break-up',sINR(c.capital),invBreak)}
      ${donutCell('Means of Finance',sINR(c.loan+c.margin),finBreak)}
      ${donutCell('Income Mix',sINR(sum(c.incomeBreak)),incBreak)}
      ${donutCell('Annual Cost Break-up',sINR(sum(c.costBreak)),costBreak)}
    </div>`);

    /* 05 — THE PROOF */
    const p05=panel('05','The Proof — Performance over '+c.NY+' Years',`<div style="display:flex;flex-direction:column;justify-content:space-between;height:100%">
      <div><div style="display:flex;justify-content:space-between;align-items:center"><div class="sub-t">Income vs Expenditure</div><div style="font-size:8px;color:${MUT}"><span style="color:${PAL[0]};font-weight:800">■</span> Income &nbsp;<span style="color:${PAL[1]};font-weight:800">■</span> Expenditure</div></div>
        ${barChart(c.yearLabels,c.income,c.expenditure,440,150)}</div>
      <div style="display:flex;gap:12px">
        <div style="flex:1"><div class="sub-t">Break-even Spotlight</div><div style="font-size:9px;color:${INK};line-height:1.4">Net income turns positive at <b>${beYear}</b> and stays positive through Year ${c.NY}.</div></div>
        <div style="flex:1"><div class="sub-t">Key Numbers (avg/yr)</div>
          <div style="font-size:9px;color:${INK};display:flex;justify-content:space-between;margin:1px 0"><span>Net Income</span><b>${sINR(mean(c.net))}</b></div>
          <div style="font-size:9px;color:${INK};display:flex;justify-content:space-between;margin:1px 0"><span>Total Income</span><b>${sINR(mean(c.income))}</b></div>
          <div style="font-size:9px;color:${INK};display:flex;justify-content:space-between;margin:1px 0"><span>Expenditure</span><b>${sINR(mean(c.expenditure))}</b></div>
        </div>
      </div></div>`);

    /* 06 — REPAYMENT */
    let emiRows=''; const show=Math.min(c.NY,7);
    for(let y=0;y<show;y++){emiRows+=`<tr><td>${c.yearLabels[y]}</td><td>${sINR(c.loanBalance[y])}</td><td>${sINR((c.yrPrin[y]||0)+(c.yrInt[y]||0))}</td><td>${sINR(c.loanBalance[y+1])}</td></tr>`;}
    const p06=panel('06','Repayment — Safe & Comfortable',`<div style="display:flex;flex-direction:column;justify-content:space-between;height:100%">
      <div><div class="sub-t">Loan Balance Outstanding</div>${lineChart(c.loanBalance,440,130)}</div>
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="flex:1.2"><div class="sub-t">EMI Schedule (₹)</div><table class="emi"><tr><th>Yr</th><th>Opening</th><th>P + I</th><th>Closing</th></tr>${emiRows}</table></div>
        <div style="flex:.85"><div class="sub-t">Debt Cover</div><div style="font-size:20px;font-weight:800;color:#1c7a43;line-height:1">${F2(c.avgDscr)}x</div><div style="font-size:8.5px;color:${INK};line-height:1.35;margin-top:2px">${c.avgDscr>=1.5?'Above':'Below'} the 1.50x pass line.<br>EMI <b>${sINR(c.emi)}</b>/mo.</div></div>
      </div></div>`);

    /* 07 — VIABILITY */
    const verdict=pos
      ? 'The project is <b>FINANCIALLY VIABLE &amp; BANKABLE</b>, expected to generate strong, sustainable returns over the '+c.NY+'-year horizon.'
      : 'One or more indicators are below the bankable threshold (NPV&gt;0, BCR&gt;1, IRR&gt;rate, DSCR&gt;1.5). <b>Review the assumptions</b> before financing.';
    const p07=panel('07','Viability — The Numbers That Matter',`<div style="display:flex;flex-direction:column;justify-content:space-between;height:100%">
      <div style="display:flex;gap:6px">${tile('NPV',sINR(c.npv),'positive=viable')}${tile('BCR',F2(c.bcr),'>1 beneficial')}${tile('IRR',pct(c.irr),'vs '+c.interest+'%')}${tile('Avg DSCR',F2(c.avgDscr),'>1.5 safe')}</div>
      <div style="display:flex">
        <div style="flex:1;text-align:center">${gauge(c.bcr,2.5,F2(c.bcr),'BCR',c.bcr>1,92)}</div>
        <div style="flex:1;text-align:center">${gauge(c.avgDscr,4,F2(c.avgDscr),'DSCR',c.avgDscr>=1.5,92)}</div>
        <div style="flex:1;text-align:center">${gauge(c.irr,Math.max(40,c.irr*1.25),pct(c.irr),'IRR',c.irr>c.interest,92)}</div>
      </div>
      <div style="background:${pos?'#1c6b3a':'#7c5c1e'};border-left:4px solid ${GOLD};border-radius:8px;padding:8px 11px"><span style="font-size:9px;font-weight:800;color:${GOLD}">VERDICT </span><span style="font-size:9px;color:#fff;line-height:1.4">${verdict}</span></div>
    </div>`);

    /* 08 — ANNEXURES (two columns · no mentor card, no QR) */
    const anns=['Detailed Project Cost Statement','Year-wise Income Statement','Year-wise Expenditure Statement','Loan Repayment Schedule','NPV · BCR · IRR Working','Depreciation Schedule','Working Capital Calculation','Sensitivity Analysis'];
    const annHTML=anns.map((a,i)=>`<div style="display:flex;gap:7px;align-items:center;font-size:8.5px;color:${INK};margin:3px 0"><span style="flex:none;width:17px;height:17px;border-radius:4px;background:${GREEN};color:${GOLD};font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center">${i+1}</span><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a}</span></div>`).join('');
    const p08=panel('08','Annexures — Detailed Statements',`<div style="display:flex;flex-direction:column;justify-content:center;height:100%">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">${annHTML}</div>
      <div style="margin-top:9px;background:#fff;border:1px dashed #d9d2bd;border-radius:8px;padding:8px 11px;font-size:8.5px;color:${MUT};line-height:1.45">Full year-wise statements are provided in the <b>Metrics PDF</b>. Prepared with the VC&amp;RI Namakkal Livestock Project tool for <b>${c.farmer}</b>.</div>
    </div>`);

    return `<div id="cdoc"><div class="pglab">A4 Portrait · Single Sheet</div><div class="csheet">${p01}${p02}${p03}${p04}${p05}${p06}${p07}${p08}</div></div>`;
  }

  // ── preview overlay ──
  const overlay=document.getElementById('chartPreview');
  const host=document.getElementById('chartOut');
  const stage=overlay?overlay.querySelector('.cpv-stage'):null;
  const PW=1000, PH=1414;
  function fitScale(){ if(!host||!stage) return; const doc=host.firstElementChild; if(!doc) return; const vw=Math.min(stage.clientWidth, window.innerWidth||stage.clientWidth); const availW=vw-24, availH=stage.clientHeight-24; const s=Math.max(0.12,Math.min(1,availW/PW,availH/(PH+30))); host.style.transform='none'; doc.style.transformOrigin='top left'; doc.style.transform='scale('+s+')'; host.style.width=(PW*s)+'px'; host.style.height=((PH+30)*s)+'px'; }
  function openPreview(){
    const c=window.__CHART; if(!c) return;
    if(c.zero){ alert('Please go back and enter the number of animals first.'); return; }
    host.innerHTML=buildSheet(c);
    overlay.classList.add('show'); fitScale();
    requestAnimationFrame(fitScale); setTimeout(fitScale,60);
  }
  function closePreview(){ overlay.classList.remove('show'); host.style.transform='none'; host.style.height='auto'; const doc=host.firstElementChild; if(doc) doc.style.transform='none'; }

  function downloadPDF(){
    const c=window.__CHART; if(!c||!host.firstChild) return;
    const fname=c.species+'-Chart-Report_'+((c.farmer||'farm').replace(/[^\w]+/g,'_'))+'.pdf';
    if(window.html2pdf){
      // Each .csheet is captured from a clean off-screen clone (handled inside
      // exportSheetsPDF), so the live preview's scale()/scroll never affects it.
      exportSheetsPDF(host, fname, '#14532d').catch(()=>{ alert('Could not render the chart pages.'); });
    } else { alert('PDF library missing.'); }
  }
  window.addEventListener('resize',()=>{ if(overlay&&overlay.classList.contains('show')) fitScale(); });
  if(overlay){
    document.getElementById('cpvClose').addEventListener('click',closePreview);
    document.getElementById('cpvDl').addEventListener('click',downloadPDF);
    overlay.addEventListener('click',e=>{ if(e.target===overlay) closePreview(); });
  }

  // ── dropdown wiring ──
  const tg=document.getElementById('dlToggle'), menu=document.getElementById('dlMenu');
  if(tg && menu){
    tg.addEventListener('click',e=>{ e.stopPropagation(); menu.classList.toggle('show'); });
    document.addEventListener('click',()=>menu.classList.remove('show'));
    menu.addEventListener('click',e=>e.stopPropagation());
    document.getElementById('dlMetrics').addEventListener('click',()=>{ menu.classList.remove('show'); document.getElementById('downloadBtn').click(); });
    document.getElementById('dlChart').addEventListener('click',()=>{ menu.classList.remove('show'); openPreview(); });
  }
})();
</script>
</body>
</html>
