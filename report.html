<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Report | Dairy Farming · VC&amp;RI Namakkal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gd:#14532d;--gm:#1B5E20;--gl:#2E7D32;--gp:#E8F5E9;--gold:#F9A825;--border:#c8dfc8;--text:#10241a;--muted:#546e7a}
/* ════ APP SHELL: page does not scroll; only the report area scrolls ════ */
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:#eef3ee;color:var(--text);
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.app-header{flex:none;z-index:100}
.app-main{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden}

/* SCREEN NAV (static — not sticky) */
.screen-nav{background:var(--gd);color:#fff;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:static;z-index:100}
.screen-nav .mid{font-size:13px;color:rgba(255,255,255,.85)}
.screen-nav .mid b{color:var(--gold)}
.back-btn{color:rgba(255,255,255,.75);font-size:13px;display:flex;align-items:center;gap:6px;text-decoration:none}
.back-btn:hover{color:#fff}

.report-container{max-width:880px;margin:28px auto;padding:0 18px 70px}
.rpage{background:#fff;margin-bottom:20px;border-radius:5px;box-shadow:0 3px 16px rgba(0,0,0,.09);overflow:hidden}
.rpage-inner{padding:30px 38px 24px}

/* page header */
.pg-header{border-bottom:2px solid var(--gd);padding-bottom:12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start}
.pg-header h2{font-family:'Playfair Display',serif;font-size:13px;color:var(--gd);font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.pg-header p{font-size:10.5px;color:var(--muted);margin-top:2px}
.pg-header .r{text-align:right;font-size:10.5px;color:var(--muted)}
.pg-header .r b{display:block;font-size:12.5px;color:var(--text)}

/* section title */
.sec-title{background:linear-gradient(135deg,var(--gd),var(--gl));color:#fff;padding:9px 15px;font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:15px;border-left:4px solid var(--gold);border-radius:3px}

/* cover */
.cover{padding:56px 44px;text-align:center;background:#fff}
.cover .univ{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--gm);text-transform:uppercase}
.cover .inst{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.cover .dept{font-size:11.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.cover .seal{width:74px;height:74px;border-radius:50%;background:linear-gradient(140deg,var(--gm),var(--gl));display:grid;place-items:center;color:#fff;font-weight:800;font-size:22px;margin:24px auto;border:3px solid var(--gold);box-shadow:0 8px 22px rgba(27,94,32,.3)}
.cover h1{font-family:'Playfair Display',serif;font-size:34px;color:var(--gd);margin-bottom:6px}
.cover .subtitle{font-size:14px;color:var(--muted);margin-bottom:26px}
.cover-line{width:80px;height:4px;background:var(--gold);margin:0 auto 26px;border-radius:2px}
.cover-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px 26px;max-width:430px;margin:0 auto 24px;text-align:left;box-shadow:0 6px 20px rgba(20,83,45,.07)}
.cover-box .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eef3ee;font-size:13px}
.cover-box .row:last-child{border-bottom:none;padding-bottom:0}
.cover-box .row span{color:var(--muted)}
.cover-box .row b{color:var(--text);font-weight:700}
.cover-foot{font-size:12px;color:var(--muted)}
.cover-foot b{color:var(--gd)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:14px}
th{background:var(--gd);color:#fff;padding:8px 11px;text-align:left;font-weight:600;font-size:11.5px}
th.num{text-align:right}
td{padding:7px 11px;border-bottom:1px solid #eef3ee;vertical-align:top}
td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:nth-child(even) td{background:#f8fbf8}
tr.total td{background:var(--gp);font-weight:700;border-top:2px solid var(--gd)}
tr.subtotal td{background:#eef6ee;font-weight:600}
tr.sec-row td{background:#d8ecd8;font-weight:700;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--gd)}
.muted-cell{color:var(--muted)}

/* glance */
.glance .row{display:flex;border-bottom:1px solid #eef3ee;font-size:13px}
.glance .row .k{flex:0 0 46%;padding:9px 12px;color:var(--muted);background:#f8fbf8}
.glance .row .v{flex:1;padding:9px 12px;font-weight:600}
.glance .grp{margin:16px 0 6px;font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gl)}

/* highlight boxes */
.hl{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.hl .b{flex:1;min-width:150px;background:var(--gp);border:1px solid var(--border);border-radius:9px;padding:13px 15px;border-left:4px solid var(--gd)}
.hl .b.gold{border-left-color:var(--gold);background:#fffdf0}
.hl .b.red{border-left-color:#c62828;background:#fff5f5}
.hl .b label{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;display:block;margin-bottom:3px}
.hl .b .val{font-size:19px;font-weight:800;color:var(--gd)}
.hl .b.gold .val{color:#b8860b}.hl .b.red .val{color:#c62828}
.hl .b p{font-size:10.5px;color:var(--muted);margin-top:2px}

.verdict{background:var(--gp);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:9px;padding:14px 16px;margin-top:8px;font-size:12.5px}
.verdict b{color:var(--gd)}
.verdict .ok{color:var(--gm);font-weight:700}

.pg-num{text-align:right;font-size:10.5px;color:var(--muted);padding-top:12px;border-top:1px solid var(--border);margin-top:6px}
.pg-num .c{float:left;font-style:italic}
.note{font-size:11px;color:var(--muted);margin:-6px 0 14px}

/* nav actions */
.nav-actions{display:flex;gap:10px}
.nav-btn{display:flex;align-items:center;gap:8px;font-family:inherit;font-size:13.5px;font-weight:700;padding:9px 18px;border-radius:8px;cursor:pointer;border:none;transition:.2s;background:var(--gold);color:#3a2c00}
.nav-btn:hover{background:#ffba2e;transform:translateY(-1px)}
.nav-btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4)}
.nav-btn.ghost:hover{background:rgba(255,255,255,.12)}

/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(8,28,16,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:470px;width:100%;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);animation:pop .22s ease}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:17px 22px;color:#fff;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--gd),var(--gl))}
.modal-head.ok{background:linear-gradient(135deg,#1B5E20,#2E7D32)}
.modal-head .mh-ic{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;flex:none;font-size:18px;font-weight:800}
.modal-head h3{font-size:16px;font-weight:800}
.modal-head p{font-size:11.5px;color:rgba(255,255,255,.82);margin-top:1px}
.modal-body{padding:18px 22px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #eef3ee;font-size:13.5px}
.srow:last-child{border-bottom:none}
.srow span{color:var(--muted)}.srow b{font-weight:700;color:var(--text)}
.srow b.pill{background:var(--gp);color:var(--gm);padding:2px 11px;border-radius:14px}
.viable-note{display:flex;gap:14px;align-items:center;background:var(--gp);border:1px solid var(--border);border-radius:11px;padding:15px 16px;font-size:13px;color:var(--text);line-height:1.5}
.viable-note .big{font-size:30px;font-weight:800;color:var(--gm);flex:none;line-height:1}
.viable-note b{color:var(--gd)}
.modal-foot{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #eef3ee}
.mbtn{font-family:inherit;font-size:14px;font-weight:700;padding:11px 20px;border-radius:9px;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.mbtn.primary{background:var(--gold);color:#3a2c00}.mbtn.primary:hover{background:#ffba2e}
.mbtn.ghost{background:#fff;color:var(--muted);border:1.5px solid var(--border)}.mbtn.ghost:hover{background:var(--cream)}

@media print{
  html,body{height:auto!important;overflow:visible!important;display:block!important}
  body{background:#fff!important}
  .app-header,.app-footer,.screen-nav,.modal-bg{display:none!important}
  .app-main{overflow:visible!important;height:auto!important}
  .report-container{max-width:100%;margin:0;padding:0}
  .rpage{margin:0;box-shadow:none;border-radius:0;page-break-after:always}
  .rpage:last-child{page-break-after:avoid}
  .rpage-inner{padding:13mm 15mm}
  @page{size:A4;margin:0}
}
/* export mode (for direct PDF save via html2pdf) — neutralise the app shell */
body.exporting{background:#fff;display:block;height:auto;overflow:visible}
body.exporting .app-header,body.exporting .app-footer{display:none}
body.exporting .app-main{overflow:visible;height:auto}
body.exporting .report-container{max-width:794px;margin:0;padding:0}
body.exporting .rpage{margin:0;box-shadow:none;border-radius:0;page-break-before:always}
body.exporting .rpage:first-child{page-break-before:auto}
/* each physical page fills a full A4 (794px → 1123px): letterhead at the top,
   page number at the bottom, sections flowing from the top in between. Sections
   are packed by repaginate() so pages are full and consistent. */
body.exporting .rpage-inner{padding:13mm 14mm;min-height:1123px;box-sizing:border-box;display:flex;flex-direction:column}
body.exporting .pg-body{flex:1 1 auto;min-height:0}
body.exporting .pg-num{margin-top:10px}
/* on-screen preview: every sheet shows as a full A4 page too (short sections just
   leave empty space at the bottom) — responsive via aspect-ratio, content grows the
   page if ever taller than A4 (it won't: repaginate keeps each page within A4). */
body:not(.exporting) .rpage-inner{aspect-ratio:210/297;box-sizing:border-box;display:flex;flex-direction:column}
body:not(.exporting) .pg-body{flex:1 1 auto;min-height:0}
body:not(.exporting) .cover{aspect-ratio:210/297;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;align-items:center}
.rsec+.rsec{margin-top:22px}
/* cover: a clean full-white title page with everything centred on the page. */
body.exporting .cover{min-height:1123px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#fff}
body.exporting .cover h1,body.exporting .cover .subtitle,body.exporting .cover .univ,body.exporting .cover .inst,body.exporting .cover .dept{text-align:center}
body.exporting .cover-box{width:430px}
/* export-mode density: the on-screen row padding is generous; trim it a touch so
   the dense statement tables fit one A4 page at full width (no shrinking, uniform
   across pages). Visually almost identical to the preview. */
body.exporting td{padding-top:5px;padding-bottom:5px}
body.exporting th{padding-top:6px;padding-bottom:6px}
body.exporting table{margin-bottom:10px}
body.exporting .sec-title{margin-bottom:11px;padding-top:7px;padding-bottom:7px}
body.exporting .hl{margin-bottom:10px}
/* ════ RESPONSIVE (mobile-first) ════ */
@media(max-width:860px){
  .report-container{margin:16px auto;padding:0 12px 40px}
  .screen-nav{padding:0 14px;height:auto;min-height:56px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px}
  .screen-nav .mid{display:none}
  .nav-actions{gap:8px;flex:1;justify-content:flex-end}
  .nav-btn{padding:9px 14px;font-size:12.5px}
}
@media(max-width:620px){
  /* These are SCREEN-ONLY tweaks — scoped to :not(.exporting) so they never leak
     into the PDF. During export the document is rendered full-width (794px) in an
     off-screen container, but media queries are viewport-based and would otherwise
     still fire on a phone, collapsing tables to display:block (hugging the left)
     and stacking the highlight/glance rows. */
  body:not(.exporting) .rpage-inner{padding:18px 14px}
  body:not(.exporting) .cover{padding:30px 16px}
  body:not(.exporting) .cover h1{font-size:26px}
  /* wide tables scroll horizontally inside the page instead of breaking the layout */
  body:not(.exporting) .rpage table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
  body:not(.exporting) .hl{flex-direction:column}
  body:not(.exporting) .hl .b{min-width:0}
  body:not(.exporting) .glance .row{flex-direction:column}
  body:not(.exporting) .glance .row .k{flex:none;width:100%}
}
@media(max-width:420px){
  .screen-nav .back-btn span,.nav-btn{font-size:12px}
  .nav-btn{padding:8px 12px}
  body:not(.exporting) .cover h1{font-size:23px}
  body:not(.exporting) .sec-title{font-size:12px;padding:8px 12px}
}
/* ════ Save-PDF dropdown ════ */
.dl-wrap{position:relative}
.dl-caret{margin-left:3px}
.dl-menu{position:absolute;right:0;top:calc(100% + 7px);background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 14px 38px rgba(0,0,0,.20);min-width:236px;padding:6px;display:none;z-index:80}
.dl-menu.show{display:block}
.dl-menu button{display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;background:none;border:none;border-radius:9px;padding:10px 11px;cursor:pointer}
.dl-menu button:hover{background:var(--cream)}
.dl-menu button .di{flex:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff}
.dl-menu .di.m{background:#1B5E20}.dl-menu .di.c{background:#caa12b}
.dl-menu button b{display:block;font-size:13.5px;color:#1d3b25}
.dl-menu button span{display:block;font-size:11.5px;color:var(--muted);margin-top:1px}
/* ════ Chart report — single-sheet infographic + preview overlay ════ */
.cpv{position:fixed;inset:0;background:#ffffff;z-index:200;display:none;flex-direction:column}
.cpv.show{display:flex}
.cpv-bar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;background:#0f3d22;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.cpv-bar b{font-size:14px}
.cpv-bar .sub{font-size:11.5px;color:#a9c6ae;margin-left:8px}
.cpv-bar .acts{display:flex;gap:9px}
.cpv-bar button{display:flex;align-items:center;gap:7px;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer}
.cpv-bar .dl{background:#f0b429;color:#1c1403}.cpv-bar .dl:hover{background:#f6c34e}
.cpv-bar .cl{background:rgba(255,255,255,.14);color:#fff}.cpv-bar .cl:hover{background:rgba(255,255,255,.24)}
.cpv-stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:22px;background:#ffffff}
.cpv-stage #chartOut{transform-origin:top center}
.cpv-stage .csheet{box-shadow:0 8px 34px rgba(0,0,0,.22)}
@media(max-width:600px){.cpv-bar{flex-wrap:wrap}.cpv-bar .sub{display:none}.cpv-stage{padding:10px}.cpv-bar button{padding:8px 12px;font-size:12px}}
@media(max-width:400px){.cpv-bar{padding:9px 12px}.cpv-bar b{font-size:13px}.cpv-stage{padding:7px}}
/* the printable document — ONE A4-portrait sheet (1000×1414), all 8 panels in a 2×4 grid */
#cdoc{display:block}
.pglab{color:#5b6b60;font-family:'Segoe UI',Arial,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;margin:0 0 9px}
.csheet+.pglab{margin-top:30px}
.csheet{width:1000px;height:1414px;box-sizing:border-box;padding:20px;background:#14532d;background-image:radial-gradient(circle at 22% -5%,#1d6b44,#0f3d22 72%);display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(4,minmax(0,1fr));gap:13px;font-family:'Segoe UI',Arial,sans-serif;color:#1d3b25;page-break-after:avoid}
.csheet .cp{background:#faf6ea;border-radius:12px;position:relative;overflow:hidden;display:flex;flex-direction:column;min-width:0;min-height:0;box-shadow:0 3px 9px rgba(0,0,0,.22)}
.csheet .cp-h{flex:none;display:flex;align-items:center;gap:8px;padding:6px 13px 5px;border-bottom:1px solid #e7dfca}
.csheet .cp-n{background:#14532d;color:#f0b429;font-weight:800;font-size:11px;border-radius:5px;padding:2px 6px;font-family:Arial}
.csheet .cp-t{font-size:12px;font-weight:800;letter-spacing:.4px;color:#14532d;text-transform:uppercase}
.csheet .cp-b{flex:1 1 0;min-height:0;padding:8px 13px;overflow:hidden;display:flex;flex-direction:column;justify-content:space-evenly}
.csheet .cp-b svg.chart{width:100%;height:auto;display:block}
.csheet .cp-f{flex:none;font-size:6.5px;letter-spacing:.4px;color:#9a9377;text-align:center;padding:3px;border-top:1px solid #efe8d5;text-transform:uppercase}
.csheet .cp.cover{background:linear-gradient(150deg,#16572f,#0b3a1e);color:#f3ecd6;box-shadow:0 3px 9px rgba(0,0,0,.3)}
.csheet .cp.cover .cp-b{padding:0;display:block}
.csheet .sub-t{font-size:9.5px;font-weight:800;letter-spacing:.5px;color:#9a7a1e;text-transform:uppercase;margin:0 0 3px}
.csheet table.emi{width:100%;border-collapse:collapse;font-size:8px;color:#1d3b25}
.csheet table.emi th{background:#14532d;color:#f3ecd6;font-weight:700;padding:3px 6px;text-align:right}
.csheet table.emi th:first-child{text-align:left}
.csheet table.emi td{padding:2px 6px;text-align:right;border-bottom:1px solid #ece4cf}
.csheet table.emi td:first-child{text-align:left;font-weight:700}
</style>
</head>
<body>

<!-- ░░ FIXED HEADER ░░ -->
<header class="app-header">
  <div class="screen-nav">
    <a class="back-btn" href="form.html">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Edit Details
    </a>
    <div class="mid"><b>Bankable Dairy Project Report</b></div>
    <div class="nav-actions">
      <button class="nav-btn ghost" id="previewBtn">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview Summary
      </button>
      <div class="dl-wrap">
        <button class="nav-btn" id="dlToggle">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>
          Save PDF
          <svg class="dl-caret" width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="dl-menu" id="dlMenu">
          <button id="dlMetrics"><span class="di m"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path d="M9 17v-6M12 17v-3M15 17v-9M4 4h16v16H4z"/></svg></span><span><b>Metrics PDF</b><span>Detailed tables &amp; statements</span></span></button>
          <button id="dlChart"><span class="di c"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path d="M3 3v18h18M7 14l3-3 3 3 5-6"/></svg></span><span><b>Chart PDF</b><span>Single-sheet visual dashboard</span></span></button>
        </div>
      </div>
      <button id="downloadBtn" style="display:none"></button>
    </div>
  </div>
</header>

<!-- ░░ SCROLLABLE MAIN (fixed header above · no footer) ░░ -->
<main class="app-main">
  <div class="report-container" id="out"></div>
</main>

<!-- ░░ CHART REPORT PREVIEW OVERLAY ░░ -->
<div class="cpv" id="chartPreview">
  <div class="cpv-bar">
    <div><b>Chart Report</b><span class="sub">single-sheet visual summary · preview before download</span></div>
    <div class="acts">
      <button class="dl" id="cpvDl"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>Download PDF</button>
      <button class="cl" id="cpvClose"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg>Close</button>
    </div>
  </div>

<script>

const S = k => (D[k]||'').toString().trim();

// ════════════════════ HELPERS ════════════════════
const INR = n => '₹ '+Math.round(n).toLocaleString('en-IN');
const NUM = n => Math.round(n).toLocaleString('en-IN');
const F2  = n => (Math.round(n*100)/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const roundDown2 = x => Math.floor(x/100)*100;
function pmt(rate,nper,pv){ if(!nper) return 0; if(rate===0) return pv/nper; return pv*rate*Math.pow(1+rate,nper)/(Math.pow(1+rate,nper)-1); }
const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];

// ════════════════════ PDF EXPORT (shared, all species) ════════════════════
// This html2pdf bundle exposes ONLY window.html2pdf — there is no global
// html2canvas or jsPDF. So we (a) borrow a jsPDF instance from html2pdf's own
// worker, and (b) render each logical page to its OWN canvas via html2pdf's
// toCanvas, then drop exactly one fitted image per A4 page. This guarantees:
// no mid-content page breaks, no clipped/hidden text, no split tables/words,
// and consistent top/bottom/side margins — on every device.
function _borrowPDF(jsPDFOpts){
  const probe=document.createElement('div');
  probe.style.cssText='position:fixed;left:-9999px;top:0;width:8px;height:8px;background:#fff';
  document.body.appendChild(probe);
  return window.html2pdf().set({jsPDF:jsPDFOpts,html2canvas:{scale:1,logging:false}})
    .from(probe).toPdf().get('pdf')
    .then(pdf=>{ probe.remove(); return pdf; }, err=>{ probe.remove(); throw err; });
}
// Render one node to a canvas. html2pdf sizes its (clean, off-screen) clone
// container to the jsPDF page px-width, so we hand it a page format whose width
// equals the node's design width in px. A4's px-width is only ~794, which would
// clip a 1000px-wide chart sheet — so the width must match the node.
function _nodeToCanvas(node, designPx, bg){
  const wmm=designPx/96*25.4;                        // px → mm at 96dpi
  return window.html2pdf().set({
    jsPDF:{unit:'mm',format:[wmm, wmm/0.7071068],orientation:'portrait'},
    html2canvas:{scale:2,backgroundColor:bg,useCORS:true,logging:false},
    margin:0
  }).from(node).toContainer().toCanvas().get('canvas');
}
// Metrics report: every .rpage becomes its own A4 page, scaled to fit within an
// 8mm margin (the cover is full-bleed). One page in → one page out, never split.
async function exportPagesPDF(filename){
  document.body.classList.add('exporting');
  repaginate();                                    // ensure sections are flowed into full pages
  const pages=[...document.querySelectorAll('#out .rpage')];
  if(!pages.length){ document.body.classList.remove('exporting'); return; }
  try{
    const pdf=await _borrowPDF({unit:'mm',format:'a4',orientation:'portrait'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    for(let i=0;i<pages.length;i++){
      const isCover=!!pages[i].querySelector('.cover');
      const canvas=await _nodeToCanvas(pages[i],794,'#ffffff');
      const data=canvas.toDataURL('image/jpeg',0.95);
      pdf.addPage();
      if(isCover){
        pdf.addImage(data,'JPEG',0,0,pw,ph);                           // cover fills the page
      } else {
        // .rpage is built at exactly A4 width with its own inner margins, so it
        // maps edge-to-edge — identical to the on-screen preview. We only scale
        // down (keeping it centred) if a page runs a touch taller than A4.
        const r=Math.min(pw/canvas.width, ph/canvas.height);
        const w=canvas.width*r, h=canvas.height*r;
        pdf.addImage(data,'JPEG',(pw-w)/2,0,w,h);                      // full width, top-aligned
      }
    }
    pdf.deletePage(1);                                                  // drop the borrow-probe page
    pdf.save(filename);
  } finally { document.body.classList.remove('exporting'); }
}
// Chart dashboard: each fixed 1000×1414 .csheet becomes one full-bleed A4 page.
async function exportSheetsPDF(root, filename, bg){
  const sheets=[...root.querySelectorAll('.csheet')];
  if(!sheets.length) return;
  const pdf=await _borrowPDF({unit:'pt',format:'a4',orientation:'portrait'});
  const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
  for(let i=0;i<sheets.length;i++){
    const canvas=await _nodeToCanvas(sheets[i],1000,bg);
    pdf.addPage();
    pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,pw,ph);
  }
  pdf.deletePage(1);
  pdf.save(filename);
}

// ════════════════════ REPAGINATE — flow sections into full A4 pages ════════════════════
// The report is generated as a flat list of <section class="rsec"> blocks. This packs
// them into physical A4 pages — each with ONE letterhead at the top and ONE page-number
// footer at the bottom — so every page is filled consistently and no section is split.
// The cover stays as page 1. Measured under export conditions so it matches the PDF.
// Idempotent: safe to run again (re-collects sections wherever they currently sit).
let __RHDR='';
function repaginate(){
  const out=document.getElementById('out');
  if(!out) return;
  const secs=[...out.querySelectorAll('.rsec')];
  if(!secs.length) return;
  const coverPage = out.querySelector('.cover') ? out.querySelector('.cover').closest('.rpage') : null;
  const header = __RHDR || (out.querySelector('.pg-header') ? out.querySelector('.pg-header').outerHTML : '');
  const FOOT = n => `<div class="pg-num"><span class="c">Guided by Dr. V. Senthilkumar, Prof. &amp; Head, Dept. of AH Economics</span> Page ${n}</div>`;
  const SECTION_GAP=22;            // gap above a new top-level section (matches .rsec+.rsec)

  const wasExporting=document.body.classList.contains('exporting');
  document.body.classList.add('exporting');

  // Flatten the report into an ordered list of blocks (the children of every section),
  // keeping the original order exactly. Each block carries flags used during flow.
  const blocks=[];
  secs.forEach(sec=>{
    [...sec.children].forEach((ch,ci)=>blocks.push({
      el: ch,
      isTitle: !!(ch.classList && ch.classList.contains('sec-title')),
      isTable: ch.tagName==='TABLE',
      sectionStart: ci===0
    }));
  });

  // Off-screen measuring rig — a real .rpage-inner so heights match the export 1:1.
  // pg-body is forced to its natural (content) height so it can be measured directly.
  const rig=document.createElement('div');
  rig.style.cssText='position:absolute;left:-10000px;top:0;width:794px';
  rig.innerHTML=`<div class="rpage"><div class="rpage-inner" id="__inner"><div class="__h">${header}</div><div class="pg-body" id="__pb"></div><div class="__f">${FOOT(0)}</div></div></div>`;
  out.appendChild(rig);
  const inner=rig.querySelector('#__inner'); inner.style.minHeight='0';
  const pb=rig.querySelector('#__pb'); pb.style.flex='none';
  const hdrH=rig.querySelector('.__h').getBoundingClientRect().height;
  const ftrH=rig.querySelector('.__f').getBoundingClientRect().height;
  const padV=Math.round(26*96/25.4);                       // 13mm top + 13mm bottom
  const A4H=1123;
  const CONTENT=A4H - padV - hdrH - ftrH - 4;              // usable px of body per A4 page
  const pbH=()=>pb.getBoundingClientRect().height;

  // pages[] collects the real nodes for each physical page, in order.
  const pages=[]; let cur=[];
  const commit=()=>{ if(cur.length){ pages.push(cur); cur=[]; } pb.innerHTML=''; };

  // Place a node on the current page; if it overflows and the page already has
  // content, break to a new page first. `gap` is an extra top margin when the node
  // is NOT the first on its page (collapses with the previous block's margin).
  function place(node, gap){
    if(cur.length && gap) node.style.marginTop=gap+'px';
    pb.appendChild(node); cur.push(node);
    if(pbH()>CONTENT && cur.length>1){
      pb.removeChild(node); cur.pop(); commit();
      node.style.marginTop=''; pb.appendChild(node); cur.push(node);
    }
  }
  // Headroom left on the current page (0 when the page is empty → full page available).
  const room=()=> CONTENT - (cur.length? pbH() : 0);

  blocks.forEach(b=>{
    const gap = b.sectionStart ? SECTION_GAP : 0;
    // one section per page: every top-level section begins on a fresh A4 page
    // (sub-parts inside the same section stay together; long tables still flow over)
    if(b.sectionStart && cur.length) commit();
    // keep a title with the start of its table: if little room is left, break first
    if(b.isTitle && cur.length && room()<120) commit();

    if(!b.isTable){ place(b.el.cloneNode(true), gap); return; }

    // TABLE: place whole if it fits the remaining room; else split row-by-row across
    // pages, repeating the header rows on every page so columns stay labelled.
    const whole=b.el.cloneNode(true);
    if(cur.length && gap) whole.style.marginTop=gap+'px';
    pb.appendChild(whole);
    const overflow = pbH()>CONTENT;
    pb.removeChild(whole);
    if(!overflow){ if(cur.length && gap) whole.style.marginTop=gap+'px'; pb.appendChild(whole); cur.push(whole); return; }

    const rows=[...b.el.rows];
    let hi=0; while(hi<rows.length && rows[hi].cells.length && [...rows[hi].cells].every(c=>c.tagName==='TH')) hi++;
    const head=rows.slice(0,hi), body=rows.slice(hi);
    if(!body.length){ place(whole.cloneNode(true), gap); return; }   // nothing to split — accept overflow

    let bi=0, firstChunk=true;
    while(bi<body.length){
      const t=b.el.cloneNode(false);                 // empty table, same classes/attrs
      head.forEach(r=>t.appendChild(r.cloneNode(true)));
      if(cur.length && firstChunk && gap) t.style.marginTop=gap+'px';
      pb.appendChild(t); cur.push(t);
      if(pbH()>CONTENT && cur.length>1){             // header alone won't fit → fresh page
        pb.removeChild(t); cur.pop(); commit();
        t.style.marginTop=''; pb.appendChild(t); cur.push(t);
      }
      let added=0;
      while(bi<body.length){
        const rc=body[bi].cloneNode(true); t.appendChild(rc);
        if(pbH()>CONTENT && (added>0 || cur.length>1)){
          t.removeChild(rc);
          if(added===0){                              // header + this row won't fit here → new page, retry
            pb.removeChild(t); cur.pop(); commit();
            t.style.marginTop=''; pb.appendChild(t); cur.push(t);
            t.appendChild(rc); added++; bi++;
          }
          break;
        }
        added++; bi++;
      }
      firstChunk=false;
      if(bi<body.length) commit();                    // more rows remain → continue on next page
    }
  });
  commit();
  rig.remove();

  // Rebuild #out: cover first, then one physical page per collected group.
  const frag=document.createDocumentFragment();
  if(coverPage) frag.appendChild(coverPage);
  pages.forEach((nodes,gi)=>{
    const pg=document.createElement('div'); pg.className='rpage';
    const innr=document.createElement('div'); innr.className='rpage-inner';
    innr.innerHTML=header+'<div class="pg-body"></div>'+FOOT(gi+1);
    const body=innr.querySelector('.pg-body');
    nodes.forEach(n=>body.appendChild(n));
    pg.appendChild(innr);
    frag.appendChild(pg);
  });
  out.innerHTML='';
  out.appendChild(frag);

  if(!wasExporting) document.body.classList.remove('exporting');
}

// ════════════════════ SPECIES ROUTER ════════════════════
const SPECIES_PICK = D.species || 'Cow';

else if(SPECIES_PICK==='Hen'){ renderHen(); }

else {   // ───── COW / DAIRY (unchanged) ─────

// ════════════════════ CALC ENGINE (faithful to Excel) ════════════════════
const NY = Math.max(1, Math.round(P('C54')));      // projection years = repayment period

// ── Investment: capital ──
const animalCost  = P('C9')*P('C10');

const labourQ     = P('C37')*P('C38');

const cap = [
  ['Cost of Milch Animals', animalCost],
  ['Construction — Animal Shed', animalShed],
  ['Construction — Calves Pen', calfPen],
  ['Construction — Store Room', storeRoom],
  ['Construction — Labour Quarters', labourQ],
  ['Feeder & Waterer Equipment', feeder],
  ['Milking Can', P('C25')],
  ['Milking Machine', P('C26')],
  ['Chaff Cutter', P('C27')],
  ['Brush Cutter', P('C28')],
  ['Feed Making Machinery', P('C29')],
  ['Milk Processing Machinery', P('C30')],
  ['Motor for Irrigation', P('C31')],

  ['Overhead Tank', P('C39')],
  ['Fencing', P('C40')],
  ['Land Levelling', P('C41')],
  ['Borewell', P('C42')],
  ['Feed Mill Construction', P('C43')*P('C44')],
  ['Milk Processing Unit Construction', P('C45')*P('C46')],
  ['Bio Gas Unit', P('C47')],
  ['Vermicompost Unit', P('C48')],
  ['Silage Making Unit', P('C49')],
  ['Vehicle', (P('C58')*P('C59'))+(P('C60')*P('C61'))],
  ['Computers', P('C33')],
  ['CCTV', P('C34')],
];
const totalCapital = roundDown2(cap.reduce((a,[,v])=>a+v,0));

// ── Investment: working capital (3 months) ──
const wc = [
  ['Insurance Premium', animalCost*P('C12')/100],
  ['Transport Charges', P('C9')*P('C13')],
  ['Concentrate Feed (3 mo.)', P('D9')*P('C66')*P('C68')*90],
  ['Dry Fodder (3 mo.)', P('D9')*P('C69')*P('C70')*90],
  ['Green Fodder', P('C71')*P('C72')],
  ['Labour Wages (3 mo.)', ((P('C86')*P('C87'))+(P('C88')*P('C89'))+(P('C90')*P('C91'))+(P('C92')*P('C93')))*3],
  ['Veterinary Expenses', P('C74')*P('D9')],
  ['Electricity (3 mo.)', P('C75')*3],
  ['Fuel (3 mo.)', P('C76')*3],
  ['Miscellaneous', P('C79')*P('D9')],
  ['Feed Making Unit (3 mo.)', P('C80')/12*3],
  ['Milk Processing Unit (3 mo.)', P('C81')/12*3],
  ['Vermicompost Unit (3 mo.)', P('C82')/12*3],
  ['Silage Making Unit (3 mo.)', P('C83')/12*3],
];
const totalWC = roundDown2(wc.reduce((a,[,v])=>a+v,0));
const totalProject = roundDown2(totalCapital + totalWC);
const marginAmt = totalProject*P('C52')/100;
const loanAmt   = totalProject - marginAmt;
const subsidyAmt= totalProject*P('C55')/100;

// ── Repayment schedule (monthly, 3-month moratorium) ──
const months = NY*12, mRate = P('C53')/100/12, emi = pmt(mRate, months, loanAmt), MORA=3;
let bal=loanAmt; const monthly=[];
for(let m=1;m<=months;m++){
  let intr=bal*mRate, prin, pay;
  if(m<=MORA){ prin=0; pay=intr; }
  else { prin=emi-intr; pay=emi; bal-=prin; if(bal<-0.01){prin+=bal;pay+=bal;bal=0;} else if(bal<0){bal=0;} }
  monthly.push({m,pay,prin,intr,bal:Math.max(0,bal)});
}
const yrInt=[], yrPrin=[];
for(let y=0;y<NY;y++){ let si=0,sp=0; for(let m=y*12;m<(y+1)*12;m++){ si+=monthly[m].intr; sp+=monthly[m].prin; } yrInt.push(si); yrPrin.push(sp); }

// ── Depreciation (declining balance) ──
const bldgBase  = animalShed+calfPen+storeRoom+labourQ;
const equipBase = feeder+P('C25')+P('C26')+P('C27')+P('C28')+P('C29')+P('C30')+P('C31')+P('C32');
const depB=[],depE=[]; let bb=bldgBase, eb=equipBase;
const depTable=[];
for(let y=0;y<NY;y++){
  const dbB=bb*P('C77')/100, dbE=eb*P('C78')/100;
  depTable.push({y:y+1,bBeg:bb,bDep:dbB,bEnd:bb-dbB,eBeg:eb,eDep:dbE,eEnd:eb-dbE});
  depB.push(dbB); depE.push(dbE); bb-=dbB; eb-=dbE;
}
const totalDep = depB.map((b,y)=>b+depE[y]);

// ── Production ──
const milkB1 = Array.from({length:NY},()=>P('D9')*P('C64')*P('C11'));
const milkB2 = Array.from({length:NY},(_,y)=> y===0 ? P('F9')*180*P('C11') : P('F9')*P('C64')*P('C11'));
const milkQty = milkB1.map((b,y)=>b+milkB2[y]);

// ── Income ──
const milkInc   = milkQty.map(q=>q*P('C96'));
const maleCalf  = (P('C9')/2)*P('C97');
const femaleCalf= (P('C9')/2)*P('C98');
const manure    = P('C99')*P('C9');
const otherInc  = maleCalf+femaleCalf+manure+P('C100')+P('C101');
const totalIncome = milkInc.map(m=>m+otherInc);

// ── Expenditure (per year) ──
const insurance   = animalCost*P('C12')/100;
const labourAnnual= ((P('C86')*P('C87'))+(P('C88')*P('C89'))+(P('C90')*P('C91'))+(P('C92')*P('C93')))*12;
const vetAnnual   = P('C74')*P('C9');
const elecAnnual  = P('C75')*12;
const fuelAnnual  = P('C76')*12;
const miscAnnual  = P('C79')*P('C9');
const dryFodderAnnual = P('C9')*365*P('C69')*P('C70');
const unitExp = P('C80')+P('C81')+P('C82')+P('C83');
// Concentrate — corrected (full milking + full dry, days×kg×cost)
const concentrate = Array.from({length:NY},(_,y)=> y===0
  ? P('D9')*P('C64')*P('C66')*P('C68') + P('F9')*180*P('C66')*P('C68') + P('D9')*P('C65')*P('C67')*P('C68')
  : P('C9')*P('C64')*P('C66')*P('C68') + P('C9')*P('C65')*P('C67')*P('C68'));
const greenFodder = Array.from({length:NY},(_,y)=> y===0 ? P('C71')*P('C72') : P('C71')*P('C73'));
const transport   = Array.from({length:NY},(_,y)=> y===0 ? P('C9')*P('C13') : 0);

const expRows = [
  ['Insurance Premium', y=>insurance],
  ['Transport Charges', y=>transport[y]],
  ['Concentrate Feed', y=>concentrate[y]],
  ['Dry Fodder', y=>dryFodderAnnual],
  ['Green Fodder', y=>greenFodder[y]],
  ['Labour Wages', y=>labourAnnual],
  ['Veterinary Expenses', y=>vetAnnual],
  ['Electricity', y=>elecAnnual],
  ['Fuel', y=>fuelAnnual],
  ['Miscellaneous', y=>miscAnnual],
  ['Add-on Unit Expenses', y=>unitExp],
  ['Interest on Loan', y=>yrInt[y]],
  ['Depreciation — Building', y=>depB[y]],
  ['Depreciation — Equipment', y=>depE[y]],
];
const totalExp = Array.from({length:NY},(_,y)=> expRows.reduce((a,[,fn])=>a+fn(y),0));
const netIncome = totalIncome.map((ti,y)=>ti-totalExp[y]);

// ── Financial Analysis ──
const r = P('C53')/100;
const df=[],pwExp=[],pwBen=[];
for(let y=0;y<NY;y++){ const f=1/Math.pow(1+r,y+1); df.push(f); pwExp.push(totalExp[y]*f); pwBen.push(totalIncome[y]*f); }
const sumPWexp=pwExp.reduce((a,b)=>a+b,0), sumPWben=pwBen.reduce((a,b)=>a+b,0);
const npv = sumPWben - sumPWexp;
const bcr = sumPWexp? sumPWben/sumPWexp : 0;
const rHigh=(P('C53')+20)/100;
const inb = totalIncome.map((ti,y)=>ti-totalExp[y]);          // FIX: every year uses Total Revenue
const pvLow = inb.reduce((a,v,y)=>a+v/Math.pow(1+r,y+1),0);
const pvHigh= inb.reduce((a,v,y)=>a+v/Math.pow(1+rHigh,y+1),0);
const irr = P('C53') + 20*(pvLow/((pvLow+pvHigh)||1));

// ── DSCR ──
const dscrNum = netIncome.map((nr,y)=>nr+yrInt[y]+totalDep[y]);
const dscrDen = yrPrin.map((p,y)=>p+yrInt[y]);
const dscr = dscrNum.map((n,y)=> dscrDen[y]? n/dscrDen[y] : 0);
const avgDscr = dscrNum.reduce((a,b)=>a+b,0)/(dscrDen.reduce((a,b)=>a+b,0)||1);

// ════════════════════ RENDER ════════════════════
const YH = Array.from({length:NY},(_,y)=>ROMAN[y]+' Year');
const yhCols = YH.map(h=>`<th class="num">${h}</th>`).join('');
const animalLabel = `${S('C7')||'Cow'}${S('C8')?' / '+S('C8'):''}`;

html += `<div class="rpage"><div class="cover">

// Paste your deployed Google Apps Script Web App URL between the quotes below.
// (Setup steps are in SHEET-SETUP.md). Leave blank to disable tracking.
const TRACK_URL = "__APPS_SCRIPT_URL__";

(function trackGeneration(){
  if(!TRACK_URL) return;
  try{
    // send only once per generation (avoid double-count on report refresh)
    if(D.genToken && sessionStorage.getItem('trackSent')===D.genToken) return;
    const payload = {
      species: 'Cow',
      name: S('farmerName'),
      mobile: S('mobile'),
      email: S('email'),
      date: D.dateStr || '',
      time: D.timeStr || new Date().toLocaleTimeString('en-IN'),
      animalType: S('C7'),
      breed: S('C8'),
      numAnimals: P('C9'),
      projectCost: Math.round(totalProject),
      loan: Math.round(loanAmt),
      npv: Math.round(npv),
      bcr: +bcr.toFixed(2),
      irr: +irr.toFixed(2),
      dscr: +avgDscr.toFixed(2),
      details: JSON.stringify(D)          // full set of parameters the user entered
    };
    // Data goes in the query string of a GET (Apps Script doGet reads ?payload=...).
    const url = TRACK_URL + (TRACK_URL.indexOf('?')>=0 ? '&' : '?') +
                'payload=' + encodeURIComponent(JSON.stringify(payload));

    // Fire-and-forget — but it MUST survive long enough to reach the server.
    // A bare `new Image()` can be garbage-collected (request cancelled) before it lands,
    // so prefer fetch+keepalive, and if we fall back to Image keep a global reference.
    let sent = false;
    if (window.fetch) {
      try {
        fetch(url, { method:'GET', mode:'no-cors', keepalive:true, cache:'no-store' }).catch(()=>{});
        sent = true;
      } catch(e){}
    }
    if (!sent) {
      window.__beacons = window.__beacons || [];
      const img = new Image();
      window.__beacons.push(img);          // retained → not GC-cancelled
      img.referrerPolicy = 'no-referrer';
      img.src = url;
    }
    if(D.genToken) sessionStorage.setItem('trackSent', D.genToken);
  }catch(e){ /* tracking must never block the report */ }
})();

function renderGoat(){
  const out=document.getElementById('out');
  const NY=Math.max(1,Math.round(P('gRepay')));
  const bucks=P('gBucks'), does=P('gDoes'), tot=bucks+does;
  // ── Investment ──
  const buckCost=bucks*P('gCostMale');
  const doeCost=roundDown2(does*P('gCostFemale'));
  const adultShed=(bucks*P('gSpaceBuck')*P('gShedRate'))+(does*P('gSpaceDoe')*P('gShedRate'));
  const kidPen=does*P('gSpaceKid')*P('gShedRate');
  const storeRoom=P('gStoreArea')*P('gStoreRate');
  const labourQ=P('gLqArea')*P('gLqRate');
  const adultEquip=tot*P('gEquipAdult');
  const kidEquip=does*P('gEquipKid');
  const chaff=P('gChaffNos')*P('gChaffCost');
  const cap=[
    ['Cost of Bucks',buckCost],['Cost of Does',doeCost],
    ['Construction — Adult Shed',adultShed],['Construction — Kid Pen',kidPen],
    ['Construction — Store Room',storeRoom],['Construction — Labour Quarters',labourQ],
    ['Equipment — Adult Animals',adultEquip],['Equipment — Kids',kidEquip],['Chaff Cutter',chaff],
    ['Brush Cutter',P('gBrush')],['Mini Feed Machinery',P('gFeedMachine')],['Motor for Irrigation',P('gMotor')],
    ['Sprinkler & Fogger',P('gSprinkler')],['Overhead Tank',P('gTank')],['Fencing for Goat Shed',P('gFencing')],
    ['Land Levelling',P('gLandLevel')],['Borewell',P('gBorewell')],
    ['Vehicle',(P('gTwoW')*P('gTwoWCost'))+(P('gFourW')*P('gFourWCost'))],
    ['Computers',P('gComputers')],['CCTV',P('gCCTV')]
  ];
  const totalCapital=roundDown2(cap.reduce((a,[,v])=>a+v,0));
  const insurance=(buckCost+doeCost)*P('gInsurance')/100;
  const transport=tot*P('gTransport');
  const concentrate=((bucks*P('gConcBuck'))+(does*P('gConcDoe'))+(does*4*P('gConcKid')))*P('gConcCost')*365;
  const dryFodder=P('gDryFodder');
  const greenY1=P('gGreenArea')*P('gGreenY1');
  const labour=((P('gWorkers')*P('gWage'))+(P('gManagers')*P('gMgrSal'))+(P('gDrivers')*P('gDrvSal'))+(P('gOffice')*P('gOffSal')))*12;
  const vet=(tot*P('gVetAdult'))+(does*4*P('gVetKid'));
  const electricity=P('gElectricity')*12;
  const fuel=P('gFuel')*12;
  const misc=P('gMisc')*tot;
  const feedUnit=P('gFeedUnit');
  const wc=[
    ['Insurance Premium',insurance],['Transport Charges',transport],['Concentrate Feed',concentrate],
    ['Dry Fodder',dryFodder],['Green Fodder',greenY1],['Labour Wages',labour],['Veterinary Expenses',vet],
    ['Electricity',electricity],['Fuel',fuel],['Miscellaneous',misc],['Feed Making Unit',feedUnit]
  ];
  const totalWC=roundDown2(wc.reduce((a,[,v])=>a+v,0));
  const totalProject=roundDown2(totalCapital+totalWC);
  const margin=totalProject*P('gMargin')/100, loan=totalProject-margin, subsidy=totalProject*P('gSubsidy')/100;
  // ── Repayment (PMT, 3-month moratorium) ──
  const months=NY*12, mRate=P('gInterest')/100/12, emi=pmt(mRate,months,loan), MORA=3;
  let bal=loan; const monthly=[];
  for(let m=1;m<=months;m++){ let intr=bal*mRate,prin,pay; if(m<=MORA){prin=0;pay=intr;} else {prin=emi-intr;pay=emi;bal-=prin; if(bal<-0.01){prin+=bal;pay+=bal;bal=0;} else if(bal<0)bal=0;} monthly.push({m,pay,prin,intr,bal:Math.max(0,bal)}); }
  const yrInt=[],yrPrin=[]; for(let y=0;y<NY;y++){let si=0,sp=0;for(let mo=y*12;mo<(y+1)*12;mo++){si+=monthly[mo].intr;sp+=monthly[mo].prin;}yrInt.push(si);yrPrin.push(sp);}
  // ── Depreciation ──
  const bldgBase=adultShed+kidPen+storeRoom+labourQ;
  const equipBase=adultEquip+kidEquip+chaff+P('gBrush')+P('gFeedMachine')+P('gMotor')+P('gSprinkler');
  const depB=[],depE=[],depTable=[]; let bb=bldgBase,eb=equipBase;
  for(let y=0;y<NY;y++){const a=bb*P('gDepBuilding')/100,b=eb*P('gDepEquip')/100; depTable.push({y:y+1,bBeg:bb,bDep:a,bEnd:bb-a,eBeg:eb,eDep:b,eEnd:eb-b}); depB.push(a);depE.push(b);bb-=a;eb-=b;}
  const totalDep=depB.map((b,y)=>b+depE[y]);
  // ── Production (kids) ──
  const bornMale=does*P('gKiddings')*P('gLitter')/2, bornFemale=bornMale;
  const mortM=Math.round(bornMale*P('gKidMortality')/100), mortF=Math.round(bornFemale*P('gKidMortality')/100);
  const saleMale=Math.max(0,bornMale-mortM-P('gReplMale')), saleFemale=Math.max(0,bornFemale-mortF-P('gReplFemale'));
  const culled=P('gCulledMale')+P('gCulledFemale');
  // ── Income (flat all years) ──
  const incMale=saleMale*P('gPriceMale'), incFemale=saleFemale*P('gPriceFemale'), incManure=P('gManure')*tot, incCulled=P('gCulledPrice')*culled;
  const totalIncome=incMale+incFemale+incManure+incCulled;
  // ── Expenditure per year ──
  const opFlat=insurance+concentrate+dryFodder+greenY1+labour+vet+electricity+fuel+misc+feedUnit;
  const totalExp=Array.from({length:NY},(_,y)=> opFlat + (y===0?transport:0) + yrInt[y] + depB[y] + depE[y]);
  const netIncome=totalExp.map(e=>totalIncome-e);
  // ── Financial Analysis (Year-6 fix applied, consistent with dairy) ──
  const r=P('gInterest')/100; const df=[],pwExp=[],pwBen=[];
  for(let y=0;y<NY;y++){const f=1/Math.pow(1+r,y+1);df.push(f);pwExp.push(totalExp[y]*f);pwBen.push(totalIncome*f);}
  const sumPWexp=pwExp.reduce((a,b)=>a+b,0), sumPWben=pwBen.reduce((a,b)=>a+b,0);
  const npv=sumPWben-sumPWexp, bcr=sumPWexp?sumPWben/sumPWexp:0;
  const rH=(P('gInterest')+20)/100; const inb=totalExp.map(e=>totalIncome-e);
  let pvL=0,pvH=0; for(let y=0;y<NY;y++){pvL+=inb[y]/Math.pow(1+r,y+1);pvH+=inb[y]/Math.pow(1+rH,y+1);}

  let pageNo=0;
  const pgHeader=()=>`<div class="pg-header"><div><h2>Veterinary College &amp; Research Institute, Namakkal</h2><p>Dept. of Animal Husbandry Economics — Bankable Goat Project Report</p></div><div class="r"><b>${S('farmerName')||'—'}</b>${D.dateStr||''}<br>${S('mobile')?'Ph: '+S('mobile'):''}</div></div>`;

// ════════════════════════════════════════════════════════════════════
//  HEN ENGINE + REPORT  (faithful to "commercial meat native chicken")
// ════════════════════════════════════════════════════════════════════
function renderHen(){
  const out=document.getElementById('out');
  const NY=Math.max(1,Math.round(P('hRepay')));
  const birds=P('hBirds'), atTime=Math.max(1,P('hBatchesAtTime'));
  const batches=Array.from({length:NY},(_,y)=> y===0?P('hBatchesY1'):P('hBatchesY2'));
  // ── Investment ──
  const shed=birds*atTime*P('hFloorSpace')*P('hConstrCost');
  const equip=birds*atTime*P('hEquipBird');
  const totalCapital=shed+equip;
  const wcChicks=birds*atTime*P('hChickCost');
  const wcFeed=birds*atTime*P('hFeedPerBird')*P('hFeedCost');
  const wcVet=birds*atTime*P('hVetBird');
  const wcLabour=(P('hWorkers')*P('hWage'))+(P('hWage')/2);
  const wcElec=P('hElectricity')+(P('hElectricity')/2);
  const wcLitter=birds*atTime*P('hDeepLitter');
  const wcMisc=birds*P('hMisc');
  const totalWC=wcChicks+wcFeed+wcVet+wcLabour+wcElec+wcLitter+wcMisc;
  const totalProject=Math.floor((totalCapital+totalWC)/1000)*1000;   // ROUNDDOWN(-3)
  const margin=totalProject*P('hMargin')/100, loan=totalProject-margin, subsidy=totalProject*P('hSubsidy')/100;
  // ── Repayment (PMT, NO moratorium — EMI from month 1) ──
  const months=NY*12, mRate=P('hInterest')/100/12, emi=pmt(mRate,months,loan);
  let bal=loan; const monthly=[];
  for(let m=1;m<=months;m++){ let intr=bal*mRate, prin=emi-intr, pay=emi; bal-=prin; if(bal<-0.01){prin+=bal;pay+=bal;bal=0;}else if(bal<0)bal=0; monthly.push({m,pay,prin,intr,bal:Math.max(0,bal)}); }
  const yrInt=[],yrPrin=[]; for(let y=0;y<NY;y++){let si=0,sp=0;for(let k=y*12;k<(y+1)*12;k++){si+=monthly[k].intr;sp+=monthly[k].prin;}yrInt.push(si);yrPrin.push(sp);}
  // ── Depreciation ──
  const depB=[],depE=[],depTable=[]; let bb=shed,eb=equip;
  for(let y=0;y<NY;y++){const a=bb*P('hDepBuilding')/100,b=eb*P('hDepEquip')/100; depTable.push({y:y+1,bBeg:bb,bDep:a,bEnd:bb-a,eBeg:eb,eDep:b,eEnd:eb-b}); depB.push(a);depE.push(b);bb-=a;eb-=b;}
  const totalDep=depB.map((b,y)=>b+depE[y]);
  // ── Flock per year ──
  const introduced=batches.map(b=>birds*b);
  const mortality=introduced.map(n=>n*P('hMortality')/100);
  const sold=introduced.map((n,y)=>n-mortality[y]);
  // ── Income per year ──
  const birdIncome=sold.map(s=>s*P('hWeight')*P('hSalePrice'));
  const manureIncome=introduced.map(n=>n*P('hManure'));
  const totalIncome=birdIncome.map((v,y)=>v+manureIncome[y]);
  // ── Expenditure per year ──
  const expChicks=introduced.map(n=>n*P('hChickCost'));
  const expFeed=introduced.map(n=>n*P('hFeedPerBird')*P('hFeedCost'));
  const expLitter=introduced.map(n=>n*P('hDeepLitter'));
  const expVet=introduced.map(n=>n*P('hVetBird'));
  const expLabour=(P('hWorkers')*P('hWage'))*12;
  const expElec=P('hElectricity')*12;
  const expMisc=introduced.map(n=>n*P('hMisc'));
  const operating=introduced.map((_,y)=>expChicks[y]+expFeed[y]+expLitter[y]+expVet[y]+expLabour+expElec+expMisc[y]);
  const totalExp=operating.map((op,y)=>op+yrInt[y]+depB[y]+depE[y]);
  const netIncome=totalIncome.map((ti,y)=>ti-totalExp[y]);
  // ── Financial Analysis (no Year-6 bug; total revenue all years) ──
  const r=P('hInterest')/100; const df=[],pwExp=[],pwBen=[];
  for(let y=0;y<NY;y++){const f=1/Math.pow(1+r,y+1);df.push(f);pwExp.push(totalExp[y]*f);pwBen.push(totalIncome[y]*f);}
  const sumPWexp=pwExp.reduce((a,b)=>a+b,0), sumPWben=pwBen.reduce((a,b)=>a+b,0);
  const npv=sumPWben-sumPWexp, bcr=sumPWexp?sumPWben/sumPWexp:0;
  const rH=(P('hInterest')+20)/100; const inb=totalIncome.map((ti,y)=>ti-totalExp[y]);
  let pvL=0,pvH=0; for(let y=0;y<NY;y++){pvL+=inb[y]/Math.pow(1+r,y+1);pvH+=inb[y]/Math.pow(1+rH,y+1);}
  const irr=P('hInterest')+20*(pvL/((pvL+pvH)||1));
  const dscrNum=totalIncome.map((ti,y)=>ti-operating[y]);
  const dscrDen=yrPrin.map((p,y)=>p+yrInt[y]);

// ════════════════════════════════════════════════════════════════════
function renderSheep(){
  const out=document.getElementById('out');
  const NY=Math.max(1,Math.round(P('sRepay')));
  const lambs=P('sLambs'), batchesY=P('sBatchesY'), atTime=Math.max(1,P('sBatchesAtTime')), days=P('sFattenDays');
  // ── Investment: capital ──
  const lambCost=lambs*P('sPurchaseCost');
  const lambShed=lambs*P('sFloorSpace')*P('sShedCost');
  const storeRoom=P('sStoreArea')*P('sStoreCost');
  const labourQ=P('sLqArea')*P('sLqCost');
  const feeder=P('sEquipLamb')*lambs;
  const chaff=P('sChaff'), feedMachine=P('sFeedMachine'), sprinkler=P('sSprinkler'), tank=P('sTank');
  const fencing=P('sFencing'), landLevel=P('sLandLevel'), silageUnit=P('sSilageUnit'), computers=P('sComputers');
  const vehicle=(P('sTwoW')*P('sTwoWCost'))+(P('sFourW')*P('sFourWCost'));
  const cap=[
    ['Cost of Ram Lambs',lambCost],['Construction — Lamb Shed',lambShed],['Construction — Store Room',storeRoom],
    ['Construction — Labour Quarters',labourQ],['Equipment — Feeder & Waterer',feeder],['Chaff Cutter',chaff],
    ['Concentrate Feed Making Machinery',feedMachine],['Sprinkler & Fogger',sprinkler],['Overhead Tank',tank],
    ['Fencing',fencing],['Land Levelling',landLevel],['Silage Making Unit',silageUnit],['Vehicle',vehicle],['Computers & CCTV',computers]
  ];
  const totalCapital=cap.reduce((a,[,v])=>a+v,0);   // Excel: SUM(C5:C20), no rounding
  // ── Working capital (one batch) ──
  const insuranceWC=lambCost*P('sInsurance')/100;
  const transportWC=lambs*P('sTransport');                                   // corrected: lambs × rate
  const concWC=days*lambs*P('sConcFeed')*P('sConcCost');
  const dryWC=days*lambs*P('sDryFodder')*P('sDryCost');
  const silageWC=lambs*days*P('sSilage')*P('sSilageCost');

// ════════ Shared report actions (Preview / Save PDF / tracking) — used by Goat, Hen & Sheep ════════

    <div class="modal-body"><div class="viable-note"><div class="big">${F2(s.dscr)}</div><div>The <b>DSCR is ${F2(s.dscr)}</b> (≥ 2.0). The project comfortably services its loan and is <b>bankable &amp; viable</b>.</div></div></div>
    <div class="modal-foot"><button class="mbtn ghost" data-close>Cancel</button><button class="mbtn primary" id="vmDl2">Save PDF</button></div></div>`;
