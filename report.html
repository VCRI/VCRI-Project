<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Report | Dairy Farming · VC&amp;RI Namakkal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gd:#14532d;--gm:#1B5E20;--gl:#2E7D32;--gp:#E8F5E9;--gold:#F9A825;--border:#c8dfc8;--text:#10241a;--muted:#546e7a}
/* ════ APP SHELL: page does not scroll; only the report area scrolls ════ */
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:#eef3ee;color:var(--text);
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.app-header{flex:none;z-index:100}
.app-main{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden}

/* SCREEN NAV (static — not sticky) */
.screen-nav{background:var(--gd);color:#fff;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:static;z-index:100}
.screen-nav .mid{font-size:13px;color:rgba(255,255,255,.85)}
.screen-nav .mid b{color:var(--gold)}
.back-btn{color:rgba(255,255,255,.75);font-size:13px;display:flex;align-items:center;gap:6px;text-decoration:none}
.back-btn:hover{color:#fff}

.report-container{max-width:880px;margin:28px auto;padding:0 18px 70px}
.rpage{background:#fff;margin-bottom:20px;border-radius:5px;box-shadow:0 3px 16px rgba(0,0,0,.09);overflow:hidden}
.rpage-inner{padding:30px 38px 24px}

/* page header */
.pg-header{border-bottom:2px solid var(--gd);padding-bottom:12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start}
.pg-header h2{font-family:'Playfair Display',serif;font-size:13px;color:var(--gd);font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.pg-header p{font-size:10.5px;color:var(--muted);margin-top:2px}
.pg-header .r{text-align:right;font-size:10.5px;color:var(--muted)}
.pg-header .r b{display:block;font-size:12.5px;color:var(--text)}

/* section title */
.sec-title{background:linear-gradient(135deg,var(--gd),var(--gl));color:#fff;padding:9px 15px;font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:15px;border-left:4px solid var(--gold);border-radius:3px}

/* cover */
.cover{padding:56px 44px;text-align:center;background:radial-gradient(900px 360px at 50% -30%,#e8f7ec,transparent)}
.cover .univ{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--gm);text-transform:uppercase}
.cover .inst{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.cover .dept{font-size:11.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.cover .seal{width:74px;height:74px;border-radius:50%;background:linear-gradient(140deg,var(--gm),var(--gl));display:grid;place-items:center;color:#fff;font-weight:800;font-size:22px;margin:24px auto;border:3px solid var(--gold);box-shadow:0 8px 22px rgba(27,94,32,.3)}
.cover h1{font-family:'Playfair Display',serif;font-size:34px;color:var(--gd);margin-bottom:6px}
.cover .subtitle{font-size:14px;color:var(--muted);margin-bottom:26px}
.cover-line{width:80px;height:4px;background:var(--gold);margin:0 auto 26px;border-radius:2px}
.cover-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px 26px;max-width:430px;margin:0 auto 24px;text-align:left;box-shadow:0 6px 20px rgba(20,83,45,.07)}
.cover-box .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eef3ee;font-size:13px}
.cover-box .row:last-child{border-bottom:none;padding-bottom:0}
.cover-box .row span{color:var(--muted)}
.cover-box .row b{color:var(--text);font-weight:700}
.cover-foot{font-size:12px;color:var(--muted)}
.cover-foot b{color:var(--gd)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:14px}
th{background:var(--gd);color:#fff;padding:8px 11px;text-align:left;font-weight:600;font-size:11.5px}
th.num{text-align:right}
td{padding:7px 11px;border-bottom:1px solid #eef3ee;vertical-align:top}
td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:nth-child(even) td{background:#f8fbf8}
tr.total td{background:var(--gp);font-weight:700;border-top:2px solid var(--gd)}
tr.subtotal td{background:#eef6ee;font-weight:600}
tr.sec-row td{background:#d8ecd8;font-weight:700;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--gd)}
.muted-cell{color:var(--muted)}

/* glance */
.glance .row{display:flex;border-bottom:1px solid #eef3ee;font-size:13px}
.glance .row .k{flex:0 0 46%;padding:9px 12px;color:var(--muted);background:#f8fbf8}
.glance .row .v{flex:1;padding:9px 12px;font-weight:600}
.glance .grp{margin:16px 0 6px;font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--gl)}

/* highlight boxes */
.hl{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.hl .b{flex:1;min-width:150px;background:var(--gp);border:1px solid var(--border);border-radius:9px;padding:13px 15px;border-left:4px solid var(--gd)}
.hl .b.gold{border-left-color:var(--gold);background:#fffdf0}
.hl .b.red{border-left-color:#c62828;background:#fff5f5}
.hl .b label{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;display:block;margin-bottom:3px}
.hl .b .val{font-size:19px;font-weight:800;color:var(--gd)}
.hl .b.gold .val{color:#b8860b}.hl .b.red .val{color:#c62828}
.hl .b p{font-size:10.5px;color:var(--muted);margin-top:2px}

.verdict{background:var(--gp);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:9px;padding:14px 16px;margin-top:8px;font-size:12.5px}
.verdict b{color:var(--gd)}
.verdict .ok{color:var(--gm);font-weight:700}

.pg-num{text-align:right;font-size:10.5px;color:var(--muted);padding-top:12px;border-top:1px solid var(--border);margin-top:6px}
.pg-num .c{float:left;font-style:italic}
.note{font-size:11px;color:var(--muted);margin:-6px 0 14px}

/* nav actions */
.nav-actions{display:flex;gap:10px}
.nav-btn{display:flex;align-items:center;gap:8px;font-family:inherit;font-size:13.5px;font-weight:700;padding:9px 18px;border-radius:8px;cursor:pointer;border:none;transition:.2s;background:var(--gold);color:#3a2c00}
.nav-btn:hover{background:#ffba2e;transform:translateY(-1px)}
.nav-btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4)}
.nav-btn.ghost:hover{background:rgba(255,255,255,.12)}

/* modals */
.modal-bg{position:fixed;inset:0;background:rgba(8,28,16,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:470px;width:100%;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);animation:pop .22s ease}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:17px 22px;color:#fff;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--gd),var(--gl))}
.modal-head.ok{background:linear-gradient(135deg,#1B5E20,#2E7D32)}
.modal-head .mh-ic{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;flex:none;font-size:18px;font-weight:800}
.modal-head h3{font-size:16px;font-weight:800}
.modal-head p{font-size:11.5px;color:rgba(255,255,255,.82);margin-top:1px}
.modal-body{padding:18px 22px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #eef3ee;font-size:13.5px}
.srow:last-child{border-bottom:none}
.srow span{color:var(--muted)}.srow b{font-weight:700;color:var(--text)}
.srow b.pill{background:var(--gp);color:var(--gm);padding:2px 11px;border-radius:14px}
.viable-note{display:flex;gap:14px;align-items:center;background:var(--gp);border:1px solid var(--border);border-radius:11px;padding:15px 16px;font-size:13px;color:var(--text);line-height:1.5}
.viable-note .big{font-size:30px;font-weight:800;color:var(--gm);flex:none;line-height:1}
.viable-note b{color:var(--gd)}
.modal-foot{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #eef3ee}
.mbtn{font-family:inherit;font-size:14px;font-weight:700;padding:11px 20px;border-radius:9px;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.mbtn.primary{background:var(--gold);color:#3a2c00}.mbtn.primary:hover{background:#ffba2e}
.mbtn.ghost{background:#fff;color:var(--muted);border:1.5px solid var(--border)}.mbtn.ghost:hover{background:var(--cream)}

@media print{
  html,body{height:auto!important;overflow:visible!important;display:block!important}
  body{background:#fff!important}
  .app-header,.app-footer,.screen-nav,.modal-bg{display:none!important}
  .app-main{overflow:visible!important;height:auto!important}
  .report-container{max-width:100%;margin:0;padding:0}
  .rpage{margin:0;box-shadow:none;border-radius:0;page-break-after:always}
  .rpage:last-child{page-break-after:avoid}
  .rpage-inner{padding:13mm 15mm}
  @page{size:A4;margin:0}
}
/* export mode (for direct PDF save via html2pdf) — neutralise the app shell */
body.exporting{background:#fff;display:block;height:auto;overflow:visible}
body.exporting .app-header,body.exporting .app-footer{display:none}
body.exporting .app-main{overflow:visible;height:auto}
body.exporting .report-container{max-width:794px;margin:0;padding:0}
body.exporting .rpage{margin:0;box-shadow:none;border-radius:0;page-break-before:always}
body.exporting .rpage:first-child{page-break-before:auto}
body.exporting .rpage-inner{padding:13mm 14mm}
/* ════ RESPONSIVE (mobile-first) ════ */
@media(max-width:860px){
  .report-container{margin:16px auto;padding:0 12px 40px}
  .screen-nav{padding:0 14px;height:auto;min-height:56px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px}
  .screen-nav .mid{display:none}
  .nav-actions{gap:8px;flex:1;justify-content:flex-end}
  .nav-btn{padding:9px 14px;font-size:12.5px}
}
@media(max-width:620px){
  .rpage-inner{padding:18px 14px}
  .cover{padding:30px 16px}
  .cover h1{font-size:26px}
  /* wide tables scroll horizontally inside the page instead of breaking the layout */
  .rpage table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
  .hl{flex-direction:column}
  .hl .b{min-width:0}
  .glance .row{flex-direction:column}
  .glance .row .k{flex:none;width:100%}
}
@media(max-width:420px){
  .screen-nav .back-btn span,.nav-btn{font-size:12px}
  .nav-btn{padding:8px 12px}
  .cover h1{font-size:23px}
  .sec-title{font-size:12px;padding:8px 12px}
}
</style>
</head>
<body>

<!-- ░░ FIXED HEADER ░░ -->
<header class="app-header">
  <div class="screen-nav">
    <a class="back-btn" href="form.html">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Edit Details
    </a>
    <div class="mid"><b>Bankable Dairy Project Report</b></div>
    <div class="nav-actions">
      <button class="nav-btn ghost" id="previewBtn">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview Summary
      </button>
      <button class="nav-btn" id="downloadBtn">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>
        Save PDF
      </button>
    </div>
  </div>
</header>

<!-- ░░ SCROLLABLE MAIN (fixed header above · no footer) ░░ -->
<main class="app-main">
  <div class="report-container" id="out"></div>
</main>

<script src="html2pdf.bundle.min.js"></script>
<script>
// ════════════════════ LOAD DATA ════════════════════
const D = JSON.parse(sessionStorage.getItem('dairyData')||'null');
if(!D){ document.getElementById('out').innerHTML='<div style="padding:70px;text-align:center;font-size:16px">No data found. <a href="form.html" style="color:#1B5E20;font-weight:700">Fill the form →</a></div>'; throw new Error('no data'); }
const P = k => { const v=D[k]; return typeof v==='number'?v:(parseFloat(v)||0); };
const S = k => (D[k]||'').toString().trim();

// ════════════════════ HELPERS ════════════════════
const INR = n => '₹ '+Math.round(n).toLocaleString('en-IN');
const NUM = n => Math.round(n).toLocaleString('en-IN');
const F2  = n => (Math.round(n*100)/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const roundDown2 = x => Math.floor(x/100)*100;
function pmt(rate,nper,pv){ if(!nper) return 0; if(rate===0) return pv/nper; return pv*rate*Math.pow(1+rate,nper)/(Math.pow(1+rate,nper)-1); }
const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];

// ════════════════════ CALC ENGINE (faithful to Excel) ════════════════════
const NY = Math.max(1, Math.round(P('C54')));      // projection years = repayment period

// ── Investment: capital ──
const animalCost  = P('C9')*P('C10');
const animalShed  = roundDown2(P('C9')*P('C16')*P('C17'));
const calfPen     = P('C9')/2*P('C18')*P('C19');
const storeRoom   = P('C20')*P('C21');
const labourQ     = P('C37')*P('C38');
const feeder      = P('C9')*P('C24');
const cap = [
  ['Cost of Milch Animals', animalCost],
  ['Construction — Animal Shed', animalShed],
  ['Construction — Calves Pen', calfPen],
  ['Construction — Store Room', storeRoom],
  ['Construction — Labour Quarters', labourQ],
  ['Feeder & Waterer Equipment', feeder],
  ['Milking Can', P('C25')],
  ['Milking Machine', P('C26')],
  ['Chaff Cutter', P('C27')],
  ['Brush Cutter', P('C28')],
  ['Feed Making Machinery', P('C29')],
  ['Milk Processing Machinery', P('C30')],
  ['Motor for Irrigation', P('C31')],
  ['Sprinkler & Fogger', P('C32')],
  ['Overhead Tank', P('C39')],
  ['Fencing', P('C40')],
  ['Land Levelling', P('C41')],
  ['Borewell', P('C42')],
  ['Feed Mill Construction', P('C43')*P('C44')],
  ['Milk Processing Unit Construction', P('C45')*P('C46')],
  ['Bio Gas Unit', P('C47')],
  ['Vermicompost Unit', P('C48')],
  ['Silage Making Unit', P('C49')],
  ['Vehicle', (P('C58')*P('C59'))+(P('C60')*P('C61'))],
  ['Computers', P('C33')],
  ['CCTV', P('C34')],
];
const totalCapital = roundDown2(cap.reduce((a,[,v])=>a+v,0));

// ── Investment: working capital (3 months) ──
const wc = [
  ['Insurance Premium', animalCost*P('C12')/100],
  ['Transport Charges', P('C9')*P('C13')],
  ['Concentrate Feed (3 mo.)', P('D9')*P('C66')*P('C68')*90],
  ['Dry Fodder (3 mo.)', P('D9')*P('C69')*P('C70')*90],
  ['Green Fodder', P('C71')*P('C72')],
  ['Labour Wages (3 mo.)', ((P('C86')*P('C87'))+(P('C88')*P('C89'))+(P('C90')*P('C91'))+(P('C92')*P('C93')))*3],
  ['Veterinary Expenses', P('C74')*P('D9')],
  ['Electricity (3 mo.)', P('C75')*3],
  ['Fuel (3 mo.)', P('C76')*3],
  ['Miscellaneous', P('C79')*P('D9')],
  ['Feed Making Unit (3 mo.)', P('C80')/12*3],
  ['Milk Processing Unit (3 mo.)', P('C81')/12*3],
  ['Vermicompost Unit (3 mo.)', P('C82')/12*3],
  ['Silage Making Unit (3 mo.)', P('C83')/12*3],
];
const totalWC = roundDown2(wc.reduce((a,[,v])=>a+v,0));
const totalProject = roundDown2(totalCapital + totalWC);
const marginAmt = totalProject*P('C52')/100;
const loanAmt   = totalProject - marginAmt;
const subsidyAmt= totalProject*P('C55')/100;

// ── Repayment schedule (monthly, 3-month moratorium) ──
const months = NY*12, mRate = P('C53')/100/12, emi = pmt(mRate, months, loanAmt), MORA=3;
let bal=loanAmt; const monthly=[];
for(let m=1;m<=months;m++){
  let intr=bal*mRate, prin, pay;
  if(m<=MORA){ prin=0; pay=intr; }
  else { prin=emi-intr; pay=emi; bal-=prin; if(bal<-0.01){prin+=bal;pay+=bal;bal=0;} else if(bal<0){bal=0;} }
  monthly.push({m,pay,prin,intr,bal:Math.max(0,bal)});
}
const yrInt=[], yrPrin=[];
for(let y=0;y<NY;y++){ let si=0,sp=0; for(let m=y*12;m<(y+1)*12;m++){ si+=monthly[m].intr; sp+=monthly[m].prin; } yrInt.push(si); yrPrin.push(sp); }

// ── Depreciation (declining balance) ──
const bldgBase  = animalShed+calfPen+storeRoom+labourQ;
const equipBase = feeder+P('C25')+P('C26')+P('C27')+P('C28')+P('C29')+P('C30')+P('C31')+P('C32');
const depB=[],depE=[]; let bb=bldgBase, eb=equipBase;
const depTable=[];
for(let y=0;y<NY;y++){
  const dbB=bb*P('C77')/100, dbE=eb*P('C78')/100;
  depTable.push({y:y+1,bBeg:bb,bDep:dbB,bEnd:bb-dbB,eBeg:eb,eDep:dbE,eEnd:eb-dbE});
  depB.push(dbB); depE.push(dbE); bb-=dbB; eb-=dbE;
}
const totalDep = depB.map((b,y)=>b+depE[y]);

// ── Production ──
const milkB1 = Array.from({length:NY},()=>P('D9')*P('C64')*P('C11'));
const milkB2 = Array.from({length:NY},(_,y)=> y===0 ? P('F9')*180*P('C11') : P('F9')*P('C64')*P('C11'));
const milkQty = milkB1.map((b,y)=>b+milkB2[y]);

// ── Income ──
const milkInc   = milkQty.map(q=>q*P('C96'));
const maleCalf  = (P('C9')/2)*P('C97');
const femaleCalf= (P('C9')/2)*P('C98');
const manure    = P('C99')*P('C9');
const otherInc  = maleCalf+femaleCalf+manure+P('C100')+P('C101');
const totalIncome = milkInc.map(m=>m+otherInc);

// ── Expenditure (per year) ──
const insurance   = animalCost*P('C12')/100;
const labourAnnual= ((P('C86')*P('C87'))+(P('C88')*P('C89'))+(P('C90')*P('C91'))+(P('C92')*P('C93')))*12;
const vetAnnual   = P('C74')*P('C9');
const elecAnnual  = P('C75')*12;
const fuelAnnual  = P('C76')*12;
const miscAnnual  = P('C79')*P('C9');
const dryFodderAnnual = P('C9')*365*P('C69')*P('C70');
const unitExp = P('C80')+P('C81')+P('C82')+P('C83');
// Concentrate — corrected (full milking + full dry, days×kg×cost)
const concentrate = Array.from({length:NY},(_,y)=> y===0
  ? P('D9')*P('C64')*P('C66')*P('C68') + P('F9')*180*P('C66')*P('C68') + P('D9')*P('C65')*P('C67')*P('C68')
  : P('C9')*P('C64')*P('C66')*P('C68') + P('C9')*P('C65')*P('C67')*P('C68'));
const greenFodder = Array.from({length:NY},(_,y)=> y===0 ? P('C71')*P('C72') : P('C71')*P('C73'));
const transport   = Array.from({length:NY},(_,y)=> y===0 ? P('C9')*P('C13') : 0);

const expRows = [
  ['Insurance Premium', y=>insurance],
  ['Transport Charges', y=>transport[y]],
  ['Concentrate Feed', y=>concentrate[y]],
  ['Dry Fodder', y=>dryFodderAnnual],
  ['Green Fodder', y=>greenFodder[y]],
  ['Labour Wages', y=>labourAnnual],
  ['Veterinary Expenses', y=>vetAnnual],
  ['Electricity', y=>elecAnnual],
  ['Fuel', y=>fuelAnnual],
  ['Miscellaneous', y=>miscAnnual],
  ['Add-on Unit Expenses', y=>unitExp],
  ['Interest on Loan', y=>yrInt[y]],
  ['Depreciation — Building', y=>depB[y]],
  ['Depreciation — Equipment', y=>depE[y]],
];
const totalExp = Array.from({length:NY},(_,y)=> expRows.reduce((a,[,fn])=>a+fn(y),0));
const netIncome = totalIncome.map((ti,y)=>ti-totalExp[y]);

// ── Financial Analysis ──
const r = P('C53')/100;
const df=[],pwExp=[],pwBen=[];
for(let y=0;y<NY;y++){ const f=1/Math.pow(1+r,y+1); df.push(f); pwExp.push(totalExp[y]*f); pwBen.push(totalIncome[y]*f); }

const npv = sumPWben - sumPWexp;

const rHigh=(P('C53')+20)/100;

const pvHigh= inb.reduce((a,v,y)=>a+v/Math.pow(1+rHigh,y+1),0);
const irr = P('C53') + 20*(pvLow/((pvLow+pvHigh)||1));

zeroModal.querySelector('#zmGo').addEventListener('click',()=>{ window.location.href='form.html'; });

const openModal  = m => m.classList.add('show');
const closeModal = m => m.classList.remove('show');
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',e=>closeModal(e.target.closest('.modal-bg'))));
[previewModal,viableModal,zeroModal].forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) closeModal(m); }));

let saving=false;
function doDownload(){
  if(saving) return; saving=true;
  closeModal(previewModal); closeModal(viableModal);
  const el=document.getElementById('out');
  const fname='Dairy-Project-Report_'+((S('farmerName')||'farm').replace(/[^\w]+/g,'_'))+'.pdf';
  document.body.classList.add('exporting');
  const done=()=>{ document.body.classList.remove('exporting'); saving=false; };
  if(window.html2pdf){
    html2pdf().set({
      margin:0,
      filename:fname,
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,backgroundColor:'#ffffff',useCORS:true,windowWidth:794},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['css','legacy']}
    }).from(el).save().then(done).catch(done);
  } else {
    // PDF library not available — never fall back to the print dialog
    done();
    alert('Could not prepare the PDF. Please make sure "html2pdf.bundle.min.js" is in the same folder as this page, then try again.');
  }
}
function requestDownload(){
  closeModal(previewModal);
  if(dscrViable) openModal(viableModal);   // show viable notification first (DSCR ≥ 2)
  else doDownload();
}
document.getElementById('previewBtn').addEventListener('click',()=> openModal(ZERO ? zeroModal : previewModal));
document.getElementById('downloadBtn').addEventListener('click',()=> ZERO ? openModal(zeroModal) : requestDownload());
document.getElementById('pmDownload').addEventListener('click',requestDownload);
document.getElementById('vmDownload').addEventListener('click',doDownload);

const TRACK_URL = "https://script.google.com/macros/s/AKfycbxIQVraHWfJ7nmahwKFGN8EPxmvcqRPp5qFFFLpGwxTACt9znlRwgaIaLdYoexVZVTX/exec";

(function trackGeneration(){
  if(!TRACK_URL) return;
  try{
    // send only once per generation (avoid double-count on report refresh)
    if(D.genToken && sessionStorage.getItem('trackSent')===D.genToken) return;
    const payload = {
      name: S('farmerName'),
      mobile: S('mobile'),
      email: S('email'),
      date: D.dateStr || '',
      time: D.timeStr || new Date().toLocaleTimeString('en-IN'),
      animalType: S('C7'),
      breed: S('C8'),
      numAnimals: P('C9'),
      projectCost: Math.round(totalProject),
      loan: Math.round(loanAmt),
      npv: Math.round(npv),
      bcr: +bcr.toFixed(2),
      irr: +irr.toFixed(2),
      dscr: +avgDscr.toFixed(2),
      details: JSON.stringify(D)          // full set of parameters the user entered
    };
    // Data goes in the query string of a GET (Apps Script doGet reads ?payload=...).
    const url = TRACK_URL + (TRACK_URL.indexOf('?')>=0 ? '&' : '?') +
                'payload=' + encodeURIComponent(JSON.stringify(payload));

    // Fire-and-forget — but it MUST survive long enough to reach the server.
    // A bare `new Image()` can be garbage-collected (request cancelled) before it lands,
    // so prefer fetch+keepalive, and if we fall back to Image keep a global reference.
    let sent = false;
    if (window.fetch) {
      try {
        fetch(url, { method:'GET', mode:'no-cors', keepalive:true, cache:'no-store' }).catch(()=>{});
        sent = true;
      } catch(e){}
    }
    if (!sent) {
      window.__beacons = window.__beacons || [];
      const img = new Image();
      window.__beacons.push(img);          // retained → not GC-cancelled
      img.referrerPolicy = 'no-referrer';
      img.src = url;
    }
    if(D.genToken) sessionStorage.setItem('trackSent', D.genToken);
  }catch(e){ /* tracking must never block the report */ }
})();
