name: Deploy VCRI site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Put the secret URL into the site
        run: |
          sed -i "s#__APPS_SCRIPT_URL__#${{ secrets.APPS_SCRIPT_URL }}#g" report.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Package the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
